function generateId() {
  return "mod_" + Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function parseCSV(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return null;
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g, ""));
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ""; });
    return obj;
  });
  return { headers, rows };
}

// 統一入力: CSV(手動投入) と JV-Link JSON(racecards.data) の両対応
// JSONの場合は entries + history(直近4走) をフラットな行に変換し、
// CSVと同じ日本語キー(馬番/馬名/騎手/オッズ/人気/前走着順...)で分析モジュールに渡す
function parseRacecard(rc) {
  if (rc.data && rc.data.entries && rc.data.entries.length) {
    const hist = rc.data.history || [];
    const rows = rc.data.entries.map(e => {
      const row = {
        "馬番": e.number, "枠番": e.frame, "馬名": e.horse_name,
        "性別": e.sex, "馬齢": e.age, "騎手": e.jockey, "調教師": e.trainer,
        "斤量": e.weight, "馬体重": e.horse_weight,
        "オッズ": e.odds, "人気": e.popularity, "PR": e.PR,
      };
      const past = hist.filter(h => h.horse_id === e.horse_id)
                       .sort((a, b) => (b.race_id || "").localeCompare(a.race_id || ""));
      const labels = ["前走", "2走前", "3走前", "4走前"];
      labels.forEach((lb, i) => {
        const p = past[i];
        row[lb + "着順"] = p ? p.finish : "";
        row[lb + "人気"] = p ? p.popularity : "";
        row[lb + "オッズ"] = p ? p.odds : "";
        row[lb + "上がり"] = p ? p.last3f : "";
        row[lb + "距離"] = p ? p.distance : "";
        row[lb + "頭数"] = p ? p.head_count : "";
      });
      return row;
    });
    return { headers: Object.keys(rows[0] || {}), rows };
  }
  if (rc.csv) return parseRacecard(rc);
  return null;
}

function toNum(v) {
  if (v === undefined || v === null || v === "" || v === "無" || v === "-") return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
}

function evaluateFormula(formula, vars) {
  try {
    let expr = formula;
    // Map all variable names to safe JS identifiers via a lookup object
    const safeVars = {};
    const keyMap = {};
    Object.keys(vars).forEach((k, i) => {
      const safe = "_v" + i;
      keyMap[k] = safe;
      safeVars[safe] = toNum(vars[k]);
    });
    // Replace variable names in expression (longest first to avoid partial matches)
    const sortedKeys = Object.keys(keyMap).sort((a, b) => b.length - a.length);
    sortedKeys.forEach(k => {
      // Replace whole-word occurrences only
      expr = expr.split(k).join(keyMap[k]);
    });
    // Replace avg(a,b,c) with arithmetic mean
    expr = expr.replace(/avg\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `((${parts.join("+")})*1/${parts.length})`;
    });
    expr = expr.replace(/max\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `Math.max(${parts.join(",")})`;
    });
    expr = expr.replace(/min\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `Math.min(${parts.join(",")})`;
    });
    const fn = new Function(...Object.keys(safeVars), `return (${expr});`);
    const result = fn(...Object.values(safeVars));
    return isNaN(result) || !isFinite(result) ? 0 : result;
  } catch {
    return 0;
  }
}

function runAnalysis(csvData, modules) {
  const enabledModules = modules.filter(m => m.enabled);
  const results = csvData.rows.map(row => {
    const vars = { ...row };
    const moduleScores = {};
    for (const mod of enabledModules) {
      const score = evaluateFormula(mod.formula, { ...vars, ...moduleScores });
      moduleScores[mod.outputVar] = score;
    }
    const total = moduleScores["total_score"] ?? 0;
    return { row, moduleScores, total };
  });
  results.sort((a, b) => b.total - a.total);
  return results.map((r, i) => ({ ...r, rank: i + 1 }));
}

function validateFormula(formula, modules, currentId) {
  const errors = [];
  // Check parens
  let depth = 0;
  for (const ch of formula) {
    if (ch === "(") depth++;
    if (ch === ")") depth--;
    if (depth < 0) { errors.push("括弧の対応が不一致"); break; }
  }
  if (depth !== 0) errors.push("括弧の対応が不一致");
  // Check circular (simple: outputVar used in own formula)
  const mod = modules.find(m => m.id === currentId);
  if (mod && formula.includes(mod.outputVar)) errors.push("循環参照の可能性");
  // Check OFF module reference
  for (const m of modules) {
    if (!m.enabled && m.id !== currentId && formula.includes(m.outputVar)) {
      errors.push(`OFFモジュール "${m.name}" を参照している`);
    }
  }
  return errors;
}

// Parse result CSV/text: extracts rows of {finishRank, horseNumber, horseName}
// Accepts CSV with headers containing 着順/馬番/馬名, or tab/space separated race result text
function parseResultData(text) {
  const lines = text.trim().split("\n").map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return null;

  // Try CSV with headers first
  const firstLine = lines[0];
  if (firstLine.includes("着順") && (firstLine.includes("馬名") || firstLine.includes("馬番"))) {
    const delim = firstLine.includes(",") ? "," : "\t";
    const headers = firstLine.split(delim).map(h => h.trim());
    const idxRank = headers.findIndex(h => h.includes("着順"));
    const idxNum = headers.findIndex(h => h === "馬番" || h.includes("馬番"));
    const idxName = headers.findIndex(h => h.includes("馬名"));
    const order = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = lines[i].split(delim).map(c => c.trim());
      const rank = parseInt(cells[idxRank]);
      if (isNaN(rank)) continue;
      order.push({
        finishRank: rank,
        horseNumber: idxNum >= 0 ? cells[idxNum] : "",
        horseName: idxName >= 0 ? cells[idxName] : "",
      });
    }
    return order.length > 0 ? order : null;
  }

  // Fallback: free-text lines like "1 枠8桃 17 ロブチェン 牡3 ..."
  const order = [];
  for (const line of lines) {
    const m = line.match(/^(\d{1,2})\s+(?:枠\d+\S*\s+)?(\d{1,2})\s+(\S+)/);
    if (m) {
      order.push({ finishRank: parseInt(m[1]), horseNumber: m[2], horseName: m[3] });
    }
  }
  return order.length >= 3 ? order : null;
}

// Match result order against history entries by horse name overlap; returns best raceId or null
// Extract meta info (date, raceName) from result text/CSV header lines
function extractResultMeta(text) {
  const meta = {};
  const lines = text.split("\n").slice(0, 10).join(" ");
  // Date pattern like 2026年5月31日 or 2026/05/31
  const dateM = lines.match(/(\d{4}年\d{1,2}月\d{1,2}日|\d{4}\/\d{2}\/\d{2})/);
  if (dateM) meta.date = dateM[1];
  // Race name: look for GⅠ/GⅡ/GⅢ/L/重賞 around text
  const raceM = lines.match(/([\u30A0-\u30FF\u3040-\u309F\u4E00-\u9FFF]{2,}(?:賞|杯|ステークス|カップ|記念|derby|Derby))/i);
  if (raceM) meta.raceName = raceM[1];
  return Object.keys(meta).length > 0 ? meta : null;
}

// Spearman rank correlation between predicted ranks and finish ranks
function spearmanCorrelation(pairs) {
  // pairs: [{pred, actual}]
  const n = pairs.length;
  if (n < 3) return null;
  const dSum = pairs.reduce((s, p) => s + Math.pow(p.pred - p.actual, 2), 0);
  return 1 - (6 * dSum) / (n * (n * n - 1));
}

// Compute correlation for one history entry with full result order
function raceCorrelation(h) {
  if (!h.result || !h.result.order || !h.predictions) return null;
  const finishMap = {};
  h.result.order.forEach(o => { finishMap[o.horseName] = o.finishRank; });
  const pairs = h.predictions
    .filter(p => finishMap[p.horseName] !== undefined)
    .map(p => ({ pred: p.rank, actual: finishMap[p.horseName] }));
  return spearmanCorrelation(pairs);
}

// Group history entries by module configuration signature
function moduleSignature(h) {
  if (!h.modules) return "不明";
  return h.modules.map(m => m.name).sort().join(" + ");
}

async function sbFetch(table, query = "") {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, { headers: sbHeaders });

}

// ページング取得（1000件超のentries対策）
async function sbFetchAll(table, query = "") {
  const all = [];
  const pageSize = 1000;
  for (let from = 0; ; from += pageSize) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      headers: { ...sbHeaders, "Range-Unit": "items", "Range": `${from}-${from + pageSize - 1}` },
    });
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    all.push(...rows);
    if (rows.length < pageSize) break;
  }
  return all;
}

// Config signature: identifies a unique module configuration
function configSignature(modules) {
  const enabled = modules.filter(m => m.enabled)
    .map(m => m.outputVar + "=" + m.formula.replace(/\s+/g, ""))
    .sort()
    .join("|");
  let h = 0;
  for (let i = 0; i < enabled.length; i++) {
    h = ((h << 5) - h + enabled.charCodeAt(i)) | 0;
  }
  return "cfg_" + (h >>> 0).toString(16);
}

function configName(modules) {
  return modules.filter(m => m.enabled).map(m => m.name).join(" + ");
}

// Upsert with composite key support (predictions)
async function sbUpsertOn(table, rows, onConflict) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
    method: "POST",
    headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(rows),
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbDeletePrediction(raceId, sig) {

    method: "DELETE",

// races+entries から、アプリが使う racecard 構造を組み立てる。
//   各レース: { race_id, race_name, race_date, place, head_count,
//              data: { race, entries[], history[] } }
//   history は同一馬(horse_id)の過去走entries(着順あり・当該race_idより前)から最大4走。
function buildRacecards(races, entries) {
  // entries を race_id でグループ化
  const byRace = {};
  entries.forEach(e => {
    (byRace[e.race_id] = byRace[e.race_id] || []).push(e);
  });
  // horse_id ごとの全走（着順あり）を時系列で
  const byHorse = {};
  entries.forEach(e => {
    if (e.horse_id && e.finish != null) {
      (byHorse[e.horse_id] = byHorse[e.horse_id] || []).push(e);
    }
  });
  Object.values(byHorse).forEach(arr => arr.sort((a, b) => (b.race_id || "").localeCompare(a.race_id || "")));
  const raceMap = {};
  races.forEach(r => { raceMap[r.race_id] = r; });

  return races.map(r => {
    const es = (byRace[r.race_id] || []).slice().sort((a, b) => (a.horse_no || 0) - (b.horse_no || 0));
    const history = [];
    es.forEach(e => {
      if (!e.horse_id) return;
      const past = (byHorse[e.horse_id] || []).filter(p => (p.race_id || "") < r.race_id).slice(0, 4);
      past.forEach(p => {
        const pr = raceMap[p.race_id] || {};
        history.push({
          horse_id: e.horse_id, race_id: p.race_id,
          race_name: pr.race_name || "", grade: pr.grade || "",
          finish: p.finish, head_count: pr.head_count,
          distance: pr.distance, surface: pr.surface || "",
          time: p.race_time || "", last3f: p.last3f,
          popularity: p.popularity, odds: p.odds,
        });
      });
    });
    return {
      race_id: r.race_id, race_name: r.race_name, race_date: r.race_date,
      place: r.course, head_count: r.head_count,
      data: {
        race: {
          race_id: r.race_id, race_name: r.race_name, date: r.race_date,
          course: r.course, distance: r.distance, surface: r.surface,
          condition: r.condition, grade: r.grade,
        },
        entries: es.map(e => ({
          horse_id: e.horse_id, horse_name: e.horse_name,
          frame: e.frame_no, number: e.horse_no, sex: e.sex, age: e.age,
          jockey: e.jockey, trainer: e.trainer, weight: e.weight,
          horse_weight: e.horse_weight, odds: e.odds, popularity: e.popularity,
        })),
        history,
      },
      // 結果（着順が入っていれば results 相当を内包）
      _result: (() => {
        const fin = es.filter(e => e.finish != null).sort((a, b) => a.finish - b.finish);
        if (!fin.length) return null;
        return {
          order: fin.map(e => ({ finishRank: e.finish, horseName: e.horse_name, horseNumber: e.horse_no })),
          first: fin[0].horse_name,
        };
      })(),
    };
  });
}

  row: { display: "flex", gap: 8, alignItems: "center" },

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", overflowY: "auto", padding: "20px 0" }}>
      <div style={{ background: "#fff", width: "95%", maxWidth: 460, border: "1px solid #111" }}>
        <div style={{ ...S.row, padding: "10px 14px", borderBottom: "1px solid #ccc", justifyContent: "space-between" }}>
          <span style={{ fontWeight: 700 }}>{title}</span>
          <button onClick={onClose} style={{ ...S.btn, padding: "2px 8px" }}>✕</button>
        </div>
        <div style={{ padding: "14px" }}>{children}</div>
      </div>
    </div>
  );
}

function FormulaBuilder({ formula, onChange, modules, currentId }) {
  const csvVars = ["PR", "horse_number", "horse_name", "jockey", "weight", "odds", "popular_rank", "total_prize", "wins", "waku_coef", "distance_apt", "baba_apt", "growth_coef", "sire_score", "damsire_score", "pace_coef", "style_coef", "ability_score", "jockey_win_rate", "jockey_place_rate", "run1_class_coef", "run1_finish_coef", "run1_time_index", "run1_agari", "run2_class_coef", "run2_finish_coef", "run2_time_index", "run2_agari", "run3_class_coef", "run3_finish_coef", "run3_time_index", "run3_agari", "run4_class_coef", "run4_finish_coef"];
  const ops = ["+", "-", "*", "/", "(", ")", "avg(", "max(", "min(", ",", ")"];
  const append = (val) => onChange(formula + val);
  const enabledMods = modules.filter(m => m.enabled && m.id !== currentId);
  const errors = validateFormula(formula, modules, currentId);

  return (
    <div>
      <label style={S.label}>計算式</label>
      <textarea style={{ ...S.textarea, minHeight: 70 }} value={formula} onChange={e => onChange(e.target.value)} />
      {errors.length > 0 && errors.map((e, i) => <div key={i} style={S.error}>⚠ {e}</div>)}
      <div style={S.divider} />
      <div style={{ marginBottom: 6, fontSize: 11, color: "#666" }}>演算子</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
        {ops.map(op => <button key={op} style={{ ...S.btnSmall, fontFamily: "monospace" }} onClick={() => append(op)}>{op}</button>)}
      </div>
      <div style={{ marginBottom: 6, fontSize: 11, color: "#666" }}>CSVカラム / PR変数</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
        {csvVars.map(v => <button key={v} style={{ ...S.btnSmall, fontSize: 11 }} onClick={() => append(v)}>{v}</button>)}
      </div>
      {enabledMods.length > 0 && <>
        <div style={{ marginBottom: 6, fontSize: 11, color: "#666" }}>他モジュール出力変数</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 10 }}>
          {enabledMods.map(m => <button key={m.id} style={{ ...S.btnSmall, fontSize: 11 }} onClick={() => append(m.outputVar)}>{m.outputVar}</button>)}
        </div>
      </>}
      <button style={{ ...S.btnSmall, marginTop: 4 }} onClick={() => onChange("")}>クリア</button>
    </div>
  );
}

// ============================================================
// TAB 1: 予想
// ============================================================
function RacesTab({ modules, racecards, results, predictions, refresh, busy, setBusy }) {
  const [csvText, setCsvText] = useState("");
  const [error, setError] = useState("");
  const [msg, setMsg] = useState("");
  const [openRace, setOpenRace] = useState(null);
  const [sortKey, setSortKey] = useState("date_desc"); // date_desc | date_asc | name
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [expanded, setExpanded] = useState({});

  const showMsg = (m, ms=3000) => { setMsg(m); setTimeout(() => setMsg(""), ms); };

  const makeRacecard = (text) => {
    const parsed = parseCSV(text);
    if (!parsed) return null;
    const first = parsed.rows[0] || {};
    const raceId = first.race_id || first.RaceID || first["レースID"] ||
      ((first["開催日"] || "") + "_" + (first["開催場"] || "") + "_" + (first["レース番号"] || ""));
    return {
      race_id: raceId,
      race_name: first.race_name || first["レース名"] || "—",
      race_date: first.race_date || first["開催日"] || "—",
      place: first.place || first["開催場"] || "—",
      head_count: parsed.rows.length,
      csv: text,
    };
  };

  const uploadText = async () => {
    if (!csvText.trim()) { setError("CSVを入力してください"); return; }
    const rc = makeRacecard(csvText);
    if (!rc) { setError("CSVの形式が正しくありません"); return; }
    setError(""); setBusy(true);
    try {
      await db.saveRacecard(rc);
      setCsvText("");
      await refresh();
      showMsg(`✓ 「${rc.race_name}」をDBに登録しました`);
    } catch(e) { setError("✗ 登録失敗: " + e.message); }
    setBusy(false);
  };

  const uploadFiles = async (e) => {
    const files = Array.from(e.target.files);
    e.target.value = "";
    if (files.length === 0) return;
    setBusy(true); setError("");
    const cards = [];
    await Promise.all(files.map(file => new Promise(res => {
      const reader = new FileReader();
      reader.onload = ev => { const rc = makeRacecard(ev.target.result); if (rc) cards.push(rc); res(); };
      reader.onerror = () => res();
      reader.readAsText(file, "utf-8");
    })));
    try {
      if (cards.length > 0) await sbUpsert("racecards", cards);
      await refresh();
      showMsg(`✓ ${cards.length}/${files.length}件 DBに登録しました`);
    } catch(e) { setError("✗ 登録失敗: " + e.message); }
    setBusy(false);
  };

  const buildPredData = (parsed) => {
    const res = runAnalysis(parsed, modules);
    return {
      predictions: res.map(x => ({
        rank: x.rank,
        horseName: x.row["馬名"] || x.row.horse_name || "—",
        horseNumber: x.row["馬番"] || x.row.horse_number || "—",
        total: x.total,
        moduleScores: x.moduleScores,
      })),
      modules: modules.filter(m => m.enabled).map(m => ({ name: m.name, outputVar: m.outputVar, formula: m.formula })),
      analyzedAt: new Date().toISOString(),
    };
  };

  const runPredict = async (rc) => {
    const parsed = parseRacecard(rc);
    if (!parsed) { showMsg("✗ CSV解析失敗"); return; }
    setBusy(true);
    const sig = configSignature(modules);
    const name = configName(modules);
    try {
      await db.savePrediction(rc.race_id, sig, name, buildPredData(parsed));
      await refresh();
      showMsg(`✓ 「${rc.race_name}」を現在の設定で分析しました`);
    } catch(e) { showMsg("✗ 保存失敗: " + e.message); }
    setBusy(false);
  };

  const predictAll = async () => {
    setBusy(true);
    const sig = configSignature(modules);
    const name = configName(modules);
    let ok = 0;
    for (const rc of racecards) {
      const parsed = parseRacecard(rc);
      if (!parsed) continue;
      try { await db.savePrediction(rc.race_id, sig, name, buildPredData(parsed)); ok++; } catch {}
    }
    await refresh();
    showMsg(`✓ ${ok}件 現在の設定で一括分析しました`);
    setBusy(false);
  };

  const deleteRace = async (raceId) => {
    if (deleteConfirm !== raceId) {
      setDeleteConfirm(raceId);
      setTimeout(() => setDeleteConfirm(null), 3000);
      return;
    }
    setBusy(true);
    try {
      await db.deleteRacecard(raceId);
      await refresh();
      showMsg("✓ 出馬表・結果・分析を削除しました");
    } catch(e) { showMsg("✗ 削除失敗: " + e.message); }
    setBusy(false);
    setDeleteConfirm(null);
    if (openRace === raceId) setOpenRace(null);
  };

  const sorted = [...racecards].sort((a, b) => {
    if (sortKey === "name") return (a.race_name || "").localeCompare(b.race_name || "", "ja");
    if (sortKey === "date_asc") return (a.race_date || "").localeCompare(b.race_date || "");
    return (b.created_at || "").localeCompare(a.created_at || "");
  });

  const predsFor = (raceId) => predictions.filter(p => p.race_id === raceId);
  const resultFor = (raceId) => results.find(r => r.race_id === raceId);
  const [openVersion, setOpenVersion] = useState(null); // sig of expanded version
  const [delVerConfirm, setDelVerConfirm] = useState(null);

  const deleteVersion = async (raceId, sig) => {
    const key = raceId + sig;
    if (delVerConfirm !== key) {
      setDelVerConfirm(key);
      setTimeout(() => setDelVerConfirm(null), 3000);
      return;
    }
    setBusy(true);
    try {
      await db.deletePrediction(raceId, sig);
      await refresh();
      showMsg("✓ 分析バージョンを削除しました");
    } catch(e) { showMsg("✗ 削除失敗"); }
    setBusy(false);
    setDelVerConfirm(null);
  };

  return (
    <div style={S.page}>
      <div style={S.section}>
        <label style={S.label}>出馬表CSVをDBに登録</label>
        <textarea style={{ ...S.textarea, minHeight: 70 }} value={csvText} onChange={e => setCsvText(e.target.value)} placeholder={"開催日,開催場,...\n2026年5月31日,東京,..."} />
        <div style={{ ...S.row, gap: 8, marginTop: 6, flexWrap: "wrap" }}>
          <button style={S.btn} onClick={uploadText} disabled={busy}>テキストから登録</button>
          <label style={{ ...S.btn, display: "inline-block", opacity: busy ? 0.5 : 1 }}>
            ファイル選択（複数可）
            <input type="file" accept=".csv" multiple style={{ display: "none" }} onChange={uploadFiles} disabled={busy} />
          </label>
        </div>
      </div>

      {error && <div style={S.error}>{error}</div>}
      {msg && <div style={{ fontSize: 12, padding: "6px 10px", border: "1px solid #ccc", background: "#f9f9f9", marginBottom: 10 }}>{msg}</div>}

      <div style={{ ...S.row, justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontWeight: 700 }}>出馬表一覧 ({racecards.length}件)</span>
        <div style={{ ...S.row, gap: 6 }}>
          <select style={{ border: "1px solid #ccc", fontSize: 12, padding: "3px 6px", background: "#fff" }} value={sortKey} onChange={e => setSortKey(e.target.value)}>
            <option value="date_desc">新しい順</option>
            <option value="date_asc">古い順</option>
            <option value="name">名前順</option>
          </select>
          {racecards.length > 0 && <button style={S.btnSmallFill} onClick={predictAll} disabled={busy}>一括分析</button>}
        </div>
      </div>

      {racecards.length === 0 && (
        <div style={{ color: "#888", fontSize: 13, textAlign: "center", padding: "30px 0" }}>
          DBに出馬表がありません。CSVを登録してください。
        </div>
      )}

      {sorted.map(rc => {
        const preds = predsFor(rc.race_id);
        const result = resultFor(rc.race_id);
        const isOpen = openRace === rc.race_id;
        const currentSig = configSignature(modules);
        return (
          <div key={rc.race_id} style={{ ...S.card, padding: 0, marginBottom: 8 }}>
            <div style={{ padding: "10px 12px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}
              onClick={() => setOpenRace(isOpen ? null : rc.race_id)}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{rc.race_name}</div>
                <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{rc.race_date} · {rc.place} · {rc.head_count}頭</div>
              </div>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                {preds.length > 0 && <span style={{ fontSize: 10, border: "1px solid #111", padding: "1px 5px" }}>分析{preds.length}版</span>}
                {result && <span style={{ fontSize: 10, border: "1px solid #111", background: "#111", color: "#fff", padding: "1px 5px" }}>結果済</span>}
                <span style={{ fontSize: 11, color: "#999" }}>{isOpen ? "▲" : "▼"}</span>
              </div>
            </div>

            {isOpen && (
              <div style={{ borderTop: "1px solid #eee", padding: "10px 12px" }}>
                <div style={{ ...S.row, gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
                  <button style={S.btnSmallFill} onClick={() => runPredict(rc)} disabled={busy}>
                    {preds.find(p => p.config_sig === currentSig) ? "現設定で再分析" : "現設定で分析"}
                  </button>
                  <button style={S.btnSmall} onClick={() => deleteRace(rc.race_id)} disabled={busy}>
                    {deleteConfirm === rc.race_id ? "もう一度押して削除" : "レース削除"}
                  </button>
                </div>

                {preds.length === 0 && <div style={{ fontSize: 12, color: "#888" }}>未分析。「現設定で分析」で予想します。設定を変えて分析すると別バージョンとして保存されます。</div>}

                {preds.map(pred => {
                  const sig = pred.config_sig;
                  const isCurrent = sig === currentSig;
                  const verOpen = openVersion === rc.race_id + sig;
                  return (
                    <div key={sig} style={{ border: "1px solid #ddd", marginBottom: 6 }}>
                      <div style={{ padding: "7px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: isCurrent ? "#f5f5f5" : "#fff" }}
                        onClick={() => setOpenVersion(verOpen ? null : rc.race_id + sig)}>
                        <div style={{ flex: 1 }}>
                          <span style={{ fontSize: 11, fontWeight: 600 }}>{pred.config_name || sig}</span>
                          {isCurrent && <span style={{ fontSize: 9, border: "1px solid #111", padding: "0 4px", marginLeft: 6 }}>現在の設定</span>}
                          <div style={{ fontSize: 10, color: "#999", marginTop: 1 }}>{formatDate(pred.data.analyzedAt)}</div>
                        </div>
                        <span style={{ fontSize: 11, color: "#999" }}>{verOpen ? "▲" : "▼"}</span>
                      </div>
                      {verOpen && (
                        <div style={{ borderTop: "1px solid #eee", padding: "8px 10px" }}>
                          {pred.data.predictions.map((p, i) => {
                            const finish = result?.data?.order?.find(o => o.horseName === p.horseName);
                            const k = rc.race_id + sig + "-" + i;
                            return (
                              <div key={i}>
                                <div style={{ ...S.row, padding: "4px 0", borderBottom: "1px solid #f3f3f3", fontSize: 12, cursor: "pointer" }}
                                  onClick={() => setExpanded(prev => ({ ...prev, [k]: !prev[k] }))}>
                                  <span style={{ width: 26, fontWeight: 700 }}>{p.rank}</span>
                                  <span style={{ width: 28 }}>{p.horseNumber}</span>
                                  <span style={{ flex: 1 }}>{p.horseName}</span>
                                  <span style={{ fontFamily: "monospace", width: 54, textAlign: "right" }}>{Number(p.total).toFixed(1)}</span>
                                  {finish && <span style={{ width: 44, textAlign: "right", fontSize: 11, fontWeight: 700 }}>{finish.finishRank}着</span>}
                                </div>
                                {expanded[k] && p.moduleScores && (
                                  <div style={{ background: "#f9f9f9", border: "1px solid #eee", padding: "6px 10px", fontSize: 11 }}>
                                    {Object.entries(p.moduleScores).map(([mk, mv]) => (
                                      <div key={mk} style={{ ...S.row, justifyContent: "space-between" }}>
                                        <span style={{ color: "#555" }}>{mk}</span>
                                        <span style={{ fontFamily: "monospace" }}>{Number(mv).toFixed(4)}</span>
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                          <button style={{ ...S.btnSmall, marginTop: 6, fontSize: 11 }} onClick={() => deleteVersion(rc.race_id, sig)} disabled={busy}>
                            {delVerConfirm === rc.race_id + sig ? "もう一度押して削除" : "このバージョンを削除"}
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// TAB 2: 分析設定
// ============================================================
function SettingsTab({ modules, setModules }) {
  const [profile, setProfile] = useState(() => loadStorage(STORAGE_KEYS.profile, INITIAL_PROFILE));
  const [editMod, setEditMod] = useState(null); // module being edited
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [profileMsg, setProfileMsg] = useState("");
  const [initConfirm, setInitConfirm] = useState(false);

  const saveProfile = () => {
    const p = { ...profile, savedAt: new Date().toISOString(), version: profile.version };
    setProfile(p);
    saveStorage(STORAGE_KEYS.profile, p);
    saveStorage(STORAGE_KEYS.modules, modules);
    setProfileMsg("保存しました");
    setTimeout(() => setProfileMsg(""), 2000);
  };

  const initProfile = () => {
    if (!initConfirm) { setInitConfirm(true); setTimeout(() => setInitConfirm(false), 3000); return; }
    setModules(DEFAULT_MODULES);
    const p = { ...INITIAL_PROFILE, savedAt: null };
    setProfile(p);
    saveStorage(STORAGE_KEYS.modules, DEFAULT_MODULES);
    saveStorage(STORAGE_KEYS.profile, p);
    setInitConfirm(false);
  };

  const toggleModule = (id) => {
    setModules(prev => prev.map(m => m.id === id ? { ...m, enabled: !m.enabled } : m));
  };

  const duplicateModule = (mod) => {
    const newMod = { ...mod, id: generateId(), name: mod.name + " (複製)", outputVar: mod.outputVar + "_copy" };
    setModules(prev => [...prev, newMod]);
  };

  const deleteModule = (id) => {
    setModules(prev => prev.filter(m => m.id !== id));
    setConfirmDelete(null);
  };

  const addModule = () => {
    const newMod = { id: generateId(), name: "新しいモジュール", version: "1.0", enabled: false, description: "", outputVar: "new_score", formula: "0" };
    setEditMod(newMod);
  };

  const saveModule = (mod) => {
    const errors = validateFormula(mod.formula, modules, mod.id);
    if (errors.length > 0) { return; } // errors are displayed in the formula builder
    setModules(prev => {
      const exists = prev.find(m => m.id === mod.id);
      return exists ? prev.map(m => m.id === mod.id ? mod : m) : [...prev, mod];
    });
    setEditMod(null);
  };

  return (
    <div style={S.page}>
      {/* Profile */}
      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>分析プロファイル</div>
        <div style={{ marginBottom: 6 }}>
          <label style={S.label}>プロファイル名</label>
          <input style={S.input} value={profile.name} onChange={e => setProfile(p => ({ ...p, name: e.target.value }))} />
        </div>
        <div style={{ marginBottom: 6 }}>
          <label style={S.label}>分析Version</label>
          <input style={S.input} value={profile.version} onChange={e => setProfile(p => ({ ...p, version: e.target.value }))} />
        </div>
        <div style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>保存日時: {formatDate(profile.savedAt)}</div>
        <div style={{ ...S.row, gap: 8 }}>
          <button style={S.btnPrimary} onClick={saveProfile}>設定保存</button>
          <button style={S.btn} onClick={initProfile}>{initConfirm ? "もう一度押して初期化" : "初期化"}</button>
          {profileMsg && <span style={{ fontSize: 12, fontWeight: 700 }}>{profileMsg}</span>}
        </div>
      </div>

      {/* Module list */}
      <div style={{ ...S.row, justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontWeight: 700 }}>モジュール一覧</span>
        <button style={S.btnSmallFill} onClick={addModule}>＋ 追加</button>
      </div>
      {modules.map(mod => (
        <div key={mod.id} style={{ ...S.card, padding: "8px 12px" }}>
          <div style={{ ...S.row, justifyContent: "space-between" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 13 }}>{mod.name} <span style={{ fontSize: 11, color: "#888" }}>v{mod.version}</span></div>
              <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{mod.outputVar}</div>
              {mod.description && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{mod.description}</div>}
            </div>
            <div style={{ ...S.row, gap: 6, alignItems: "center" }}>
              <button style={{ ...S.btnSmall, fontSize: 11, padding: "3px 8px", background: mod.enabled ? "#111" : "#fff", color: mod.enabled ? "#fff" : "#111" }} onClick={() => toggleModule(mod.id)}>
                {mod.enabled ? "ON" : "OFF"}
              </button>
            </div>
          </div>
          <div style={{ ...S.row, gap: 6, marginTop: 8 }}>
            <button style={S.btnSmall} onClick={() => setEditMod({ ...mod })}>編集</button>
            <button style={S.btnSmall} onClick={() => duplicateModule(mod)}>複製</button>
            <button style={S.btnSmall} onClick={() => setConfirmDelete(mod.id)}>削除</button>
          </div>
        </div>
      ))}

      {/* Edit Modal */}
      {editMod && (
        <Modal title={editMod.id.startsWith("mod_") && modules.find(m => m.id === editMod.id) ? "モジュール編集" : "モジュール追加"} onClose={() => setEditMod(null)}>
          <ModuleEditor mod={editMod} onChange={setEditMod} modules={modules} onSave={saveModule} onCancel={() => setEditMod(null)} />
        </Modal>
      )}

      {/* Delete Confirm */}
      {confirmDelete && (
        <Modal title="削除確認" onClose={() => setConfirmDelete(null)}>
          <p style={{ fontSize: 13 }}>このモジュールを削除しますか？</p>
          <div style={{ ...S.row, gap: 8 }}>
            <button style={S.btnPrimary} onClick={() => deleteModule(confirmDelete)}>削除</button>
            <button style={S.btn} onClick={() => setConfirmDelete(null)}>キャンセル</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ModuleEditor({ mod, onChange, modules, onSave, onCancel }) {
  const errors = validateFormula(mod.formula, modules, mod.id);
  return (
    <div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>名称</label>
        <input style={S.input} value={mod.name} onChange={e => onChange(m => ({ ...m, name: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>Version</label>
        <input style={S.input} value={mod.version} onChange={e => onChange(m => ({ ...m, version: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>出力変数名</label>
        <input style={S.input} value={mod.outputVar} onChange={e => onChange(m => ({ ...m, outputVar: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>説明</label>
        <input style={S.input} value={mod.description} onChange={e => onChange(m => ({ ...m, description: e.target.value }))} />
      </div>
      <div style={S.divider} />
      <FormulaBuilder formula={mod.formula} onChange={f => onChange(m => ({ ...m, formula: f }))} modules={modules} currentId={mod.id} />
      <div style={S.divider} />
      <div style={{ ...S.row, gap: 8 }}>
        <button style={{ ...S.btnPrimary, opacity: errors.length > 0 ? 0.4 : 1 }} onClick={() => onSave(mod)} disabled={errors.length > 0}>保存</button>
        <button style={S.btn} onClick={onCancel}>キャンセル</button>
      </div>
    </div>
  );
}

// ============================================================
// TAB 3: 履歴
// ============================================================
function ResultsTab({ racecards, results, predictions, refresh, busy, setBusy }) {
  const [resultText, setResultText] = useState("");
  const [msg, setMsg] = useState("");
  const [bulkLog, setBulkLog] = useState([]);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const showMsg = (m, ms=4000) => { setMsg(m); setTimeout(() => setMsg(""), ms); };

  // Match a result order against racecards (using predictions horse names, or csv parse)
  const matchToRacecard = (order, meta) => {
    const names = new Set(order.map(o => o.horseName));
    let best = null, bestScore = -1;
    racecards.forEach(rc => {
      let horseNames = [];
      const pred = predictions.find(p => p.race_id === rc.race_id);
      if (pred) horseNames = pred.data.predictions.map(p => p.horseName);
      else {
        const parsed = parseRacecard(rc);
        if (parsed) horseNames = parsed.rows.map(r => r["馬名"] || r.horse_name || "");
      }
      const overlap = horseNames.filter(n => names.has(n)).length;
      const nameScore = overlap / Math.max(names.size, 1);
      let metaScore = 0;
      if (meta) {
        if (meta.date && rc.race_date && rc.race_date.includes(meta.date)) metaScore += 0.5;
        if (meta.raceName && rc.race_name && rc.race_name.includes(meta.raceName)) metaScore += 0.5;
      }
      const total = nameScore + metaScore;
      if (total > bestScore) { bestScore = total; best = { rc, overlap, total: names.size }; }
    });
    if (best && best.overlap >= Math.max(3, best.total * 0.5)) return best.rc;
    return null;
  };

  const applyResult = async (text) => {
    const order = parseResultData(text);
    if (!order) return { ok: false, reason: "解析失敗" };
    const meta = extractResultMeta(text);
    const rc = matchToRacecard(order, meta);
    if (!rc) return { ok: false, reason: "対応する出馬表なし" };
    const sorted = [...order].sort((a, b) => a.finishRank - b.finishRank);
    const data = {
      first: sorted[0]?.horseName || "",
      second: sorted[1]?.horseName || "",
      third: sorted[2]?.horseName || "",
      order: sorted,
    };
    try {
      await db.saveResult(rc.race_id, data);
      return { ok: true, raceName: rc.race_name, count: sorted.length };
    } catch(e) {
      return { ok: false, reason: "DB保存失敗" };
    }
  };

  const importText = async () => {
    setBusy(true);
    const r = await applyResult(resultText);
    if (r.ok) {
      await refresh();
      showMsg(`✓ 「${r.raceName}」に結果を紐付けました（${r.count}頭）`);
      setResultText("");
    } else {
      showMsg("✗ " + r.reason);
    }
    setBusy(false);
  };

  const importFiles = async (e) => {
    const files = Array.from(e.target.files);
    e.target.value = "";
    if (files.length === 0) return;
    setBusy(true);
    setBulkLog([]);
    const texts = await Promise.all(files.map(file => new Promise(res => {
      const reader = new FileReader();
      reader.onload = ev => res({ name: file.name, text: ev.target.result });
      reader.onerror = () => res({ name: file.name, text: "" });
      reader.readAsText(file, "utf-8");
    })));
    const log = [];
    for (const { name, text } of texts) {
      const r = await applyResult(text);
      log.push({ name, ...r });
    }
    await refresh();
    setBulkLog(log);
    const ok = log.filter(l => l.ok).length;
    showMsg(`✓ ${ok}/${files.length}件 紐付けました`);
    setBusy(false);
  };

  const deleteOne = async (raceId) => {
    if (deleteConfirm !== raceId) {
      setDeleteConfirm(raceId);
      setTimeout(() => setDeleteConfirm(null), 3000);
      return;
    }
    setBusy(true);
    try {
      await db.deleteResult(raceId);
      await refresh();
      showMsg("✓ 結果を削除しました");
    } catch(e) { showMsg("✗ 削除失敗"); }
    setBusy(false);
    setDeleteConfirm(null);
  };

  const rcFor = (raceId) => racecards.find(r => r.race_id === raceId);

  return (
    <div style={S.page}>
      <div style={{ ...S.card, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 8 }}>結果をDBに登録（自動紐付け）</div>
        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>
          結果CSV（着順・馬番・馬名）またはJRA結果テキスト。馬名＋開催日で出馬表に自動で紐付きます。
        </div>
        <label style={{ ...S.btnSmallFill, display: "inline-block", marginBottom: 8, opacity: busy ? 0.5 : 1 }}>
          ファイル選択（複数可）
          <input type="file" accept=".csv,.txt" multiple style={{ display: "none" }} onChange={importFiles} disabled={busy} />
        </label>
        {bulkLog.length > 0 && (
          <div style={{ border: "1px solid #eee", marginBottom: 8 }}>
            {bulkLog.map((l, i) => (
              <div key={i} style={{ ...S.row, justifyContent: "space-between", padding: "5px 10px", borderBottom: "1px solid #f5f5f5", fontSize: 11 }}>
                <span style={{ color: "#666", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.name}</span>
                {l.ok
                  ? <span style={{ whiteSpace: "nowrap", marginLeft: 8 }}>✓ {l.raceName}（{l.count}頭）</span>
                  : <span style={{ color: "#999", whiteSpace: "nowrap", marginLeft: 8 }}>✗ {l.reason}</span>}
              </div>
            ))}
          </div>
        )}
        <div style={S.divider} />
        <textarea style={{ ...S.textarea, minHeight: 70 }} value={resultText} onChange={e => setResultText(e.target.value)}
          placeholder={"着順,馬番,馬名\n1,17,ロブチェン\n..."} />
        <button style={{ ...S.btnSmall, marginTop: 6 }} onClick={importText} disabled={busy}>テキストから登録</button>
        {msg && <div style={{ fontSize: 12, marginTop: 8, padding: "6px 10px", border: "1px solid #ccc", background: "#f9f9f9" }}>{msg}</div>}
      </div>

      <div style={{ fontWeight: 700, marginBottom: 10 }}>結果一覧 ({results.length}件)</div>
      {results.length === 0 && (
        <div style={{ color: "#888", fontSize: 13, textAlign: "center", padding: "20px 0" }}>DBに結果がありません</div>
      )}
      {results.map(r => {
        const rc = rcFor(r.race_id);
        const top3 = r.data.order ? r.data.order.slice(0, 3) : [];
        return (
          <div key={r.race_id} style={{ ...S.card, padding: "8px 12px" }}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{rc ? rc.race_name : r.race_id}</div>
                <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>
                  {rc?.race_date} {!rc && <span style={{ color: "#999" }}>（出馬表なし）</span>}
                </div>
                <div style={{ fontSize: 11, color: "#444", marginTop: 4 }}>
                  {top3.map(o => `${o.finishRank}着 ${o.horseName}`).join(" / ")}
                </div>
              </div>
              <button style={S.btnSmall} onClick={() => deleteOne(r.race_id)} disabled={busy}>
                {deleteConfirm === r.race_id ? "確認" : "削除"}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AccumulationTab({ racecards, results, predictions }) {
  // Join: for each prediction that has a matching result
  const joined = predictions.map(p => {
    const result = results.find(r => r.race_id === p.race_id);
    const rc = racecards.find(r => r.race_id === p.race_id);
    return { raceId: p.race_id, pred: p.data, configName: p.config_name, configSig: p.config_sig, result: result?.data, rc };
  }).filter(j => j.result);

  const enteredCount = joined.length;

  let pred1Win = 0, pred3Win = 0, pred5Win = 0;
  let top3Capture = 0, top5Capture = 0;
  let winRanks = [];
  const correlations = [];

  joined.forEach(j => {
    const preds = j.pred.predictions || [];
    const order = j.result.order || [];
    const first = j.result.first;
    const winners = [j.result.first, j.result.second, j.result.third].filter(Boolean);

    const top1 = preds.find(p => p.rank === 1);
    if (top1 && first === top1.horseName) pred1Win++;
    if (preds.filter(p => p.rank <= 3).some(p => p.horseName === first)) pred3Win++;
    if (preds.filter(p => p.rank <= 5).some(p => p.horseName === first)) pred5Win++;
    winners.forEach(w => {
      const f = preds.find(p => p.horseName === w);
      if (f) { if (f.rank <= 3) top3Capture++; if (f.rank <= 5) top5Capture++; }
    });
    const wf = preds.find(p => p.horseName === first);
    if (wf) winRanks.push(wf.rank);

    // Correlation
    if (order.length >= 3) {
      const finishMap = {};
      order.forEach(o => { finishMap[o.horseName] = o.finishRank; });
      const pairs = preds.filter(p => finishMap[p.horseName] !== undefined)
        .map(p => ({ pred: p.rank, actual: finishMap[p.horseName] }));
      const corr = spearmanCorrelation(pairs);
      if (corr !== null) correlations.push({ j, corr });
    }
  });

  const pct = (n, d) => d === 0 ? "—" : (n / d * 100).toFixed(1) + "%";
  const avgWinRank = winRanks.length > 0 ? (winRanks.reduce((a,b)=>a+b,0)/winRanks.length).toFixed(1) : "—";
  const avgCorr = correlations.length > 0 ? correlations.reduce((s,x)=>s+x.corr,0)/correlations.length : null;

  // Group by config version (sig + name)
  const groups = {};
  correlations.forEach(({ j, corr }) => {
    const sig = j.configName || (j.pred.modules || []).map(m => m.name).sort().join(" + ") || "不明";
    if (!groups[sig]) groups[sig] = { corrs: [], wins: 0, races: 0 };
    groups[sig].corrs.push(corr);
    groups[sig].races++;
    const top1 = (j.pred.predictions || []).find(p => p.rank === 1);
    if (top1 && j.result.first === top1.horseName) groups[sig].wins++;
  });

  const stats = [
    ["出馬表数", racecards.length + "件"],
    ["分析済み", new Set(predictions.map(p => p.race_id)).size + "レース / " + predictions.length + "版"],
    ["結果あり（分析×結果）", enteredCount + "件"],
    ["予想1位勝率", pct(pred1Win, enteredCount)],
    ["予想TOP3勝率", pct(pred3Win, enteredCount)],
    ["予想TOP5勝率", pct(pred5Win, enteredCount)],
    ["TOP3内好走馬捕捉率", pct(top3Capture, enteredCount * 3)],
    ["TOP5内好走馬捕捉率", pct(top5Capture, enteredCount * 3)],
    ["勝ち馬の平均予想順位", avgWinRank === "—" ? "—" : avgWinRank + "位"],
  ];

  const corrLabel = (c) => {
    if (c === null) return "—";
    const v = c.toFixed(3);
    if (c >= 0.7) return v + "（強い相関）";
    if (c >= 0.4) return v + "（中程度）";
    if (c >= 0.2) return v + "（弱い）";
    return v + "（ほぼ無相関）";
  };

  return (
    <div style={S.page}>
      <div style={{ fontWeight: 700, marginBottom: 12 }}>累積分析</div>
      {enteredCount === 0 && (
        <div style={{ color: "#888", fontSize: 13, marginBottom: 16 }}>
          分析と結果が両方そろったレースがありません。レースタブで分析→結果タブで結果登録をしてください。
        </div>
      )}

      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>的中サマリー</div>
        {stats.map(([k, v]) => (
          <div key={k} style={{ ...S.row, justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #eee" }}>
            <span style={{ fontSize: 13, color: "#444" }}>{k}</span>
            <span style={{ fontWeight: 700, fontSize: 14, fontFamily: "monospace" }}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>予想順位×着順 相関分析</div>
        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>
          スピアマン順位相関。1.0に近いほど予想順位どおりに決着。対象 {correlations.length}件。
        </div>
        <div style={{ ...S.row, justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #eee" }}>
          <span style={{ fontSize: 13, color: "#444" }}>全体平均相関</span>
          <span style={{ fontWeight: 700, fontSize: 14, fontFamily: "monospace" }}>{corrLabel(avgCorr)}</span>
        </div>
        {correlations.slice(0, 15).map(({ j, corr }, idx) => (
          <div key={j.raceId + (j.configSig || "") + idx} style={{ ...S.row, justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #f3f3f3" }}>
            <span style={{ fontSize: 12, color: "#666", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {j.rc?.race_name || j.raceId}
              {j.configName && <span style={{ fontSize: 10, color: "#aaa" }}>（{j.configName}）</span>}
            </span>
            <span style={{ fontFamily: "monospace", fontSize: 13 }}>{corr.toFixed(3)}</span>
          </div>
        ))}
      </div>

      {Object.keys(groups).length > 0 && (
        <div style={{ ...S.card, marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>モジュール構成別パフォーマンス</div>
          <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>
            分析設定を変えて再分析→結果と比較すれば、どの構成が相関を上げるか検証できます。
          </div>
          {Object.entries(groups).map(([sig, g]) => {
            const avg = g.corrs.reduce((a, b) => a + b, 0) / g.corrs.length;
            return (
              <div key={sig} style={{ borderBottom: "1px solid #eee", padding: "8px 0" }}>
                <div style={{ fontSize: 11, color: "#555", marginBottom: 4 }}>{sig}</div>
                <div style={{ ...S.row, gap: 14, fontSize: 12 }}>
                  <span>件数: <b>{g.races}</b></span>
                  <span>平均相関: <b style={{ fontFamily: "monospace" }}>{avg.toFixed(3)}</b></span>
                  <span>1位勝率: <b>{pct(g.wins, g.races)}</b></span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
// TAB 5: データ管理 (Supabase)
// ============================================================
function App() {
  const [tab, setTab] = useState(0);
  const [racecards, setRacecards] = useState([]);
  const [results, setResults] = useState([]);
  const [predictions, setPredictions] = useState([]);
  const [busy, setBusy] = useState(false);
  const [loadError, setLoadError] = useState("");
  const [lastSync, setLastSync] = useState(null);
  const [modules, setModules] = useState(() => {
    const saved = loadStorage(STORAGE_KEYS.modules, null);
    if (!saved) return DEFAULT_MODULES;
    const savedIds = new Set(saved.map(m => m.id));
    const missing = DEFAULT_MODULES.filter(m => !savedIds.has(m.id));
    return missing.length > 0 ? [...missing, ...saved] : saved;
  });

  useEffect(() => { saveStorage(STORAGE_KEYS.modules, modules); }, [modules]);

  const refresh = async () => {
    try {
      const [rc, rs, pd] = await Promise.all([db.loadRacecards(), db.loadResults(), db.loadPredictions()]);
      setRacecards(rc);
      setResults(rs);
      setPredictions(pd);
      setLastSync(new Date());
      setLoadError("");
    } catch(e) {
      setLoadError("DB接続エラー: " + e.message);
    }
  };

  // Initial load + auto-refresh every 30s (realtime-ish)
  useEffect(() => {
    refresh();
    const timer = setInterval(refresh, 30000);
    return () => clearInterval(timer);
  }, []);

  const tabLabels = ["レース", "結果", "設定", "累積分析"];

  return (
    <div style={S.app}>
      <div style={{ ...S.header, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>🏇 競馬予想エンジン v3</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {busy && <span style={{ fontSize: 10, color: "#888" }}>同期中...</span>}
          <button style={{ fontSize: 11, padding: "3px 8px", border: "1px solid #ccc", background: "#fff", cursor: "pointer" }} onClick={refresh}>↻</button>
        </div>
      </div>
      <div style={{ borderBottom: "1px solid #eee", padding: "4px 16px", fontSize: 10, color: "#999", background: "#fafafa" }}>
        DB連携中 · 出馬表{racecards.length} / 結果{results.length} / 分析{predictions.length}
        {lastSync && ` · 最終同期 ${lastSync.toLocaleTimeString("ja-JP")}`}
      </div>
      {loadError && <div style={{ ...S.error, margin: "8px 16px" }}>{loadError}</div>}
      <div style={S.tabs}>
        {tabLabels.map((l, i) => (
          <button key={i} style={S.tab(tab === i)} onClick={() => setTab(i)}>{l}</button>
        ))}
      </div>
      {tab === 0 && <RacesTab modules={modules} racecards={racecards} results={results} predictions={predictions} refresh={refresh} busy={busy} setBusy={setBusy} />}
      {tab === 1 && <ResultsTab racecards={racecards} results={results} predictions={predictions} refresh={refresh} busy={busy} setBusy={setBusy} />}
      {tab === 2 && <SettingsTab modules={modules} setModules={setModules} />}
      {tab === 3 && <AccumulationTab racecards={racecards} results={results} predictions={predictions} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
