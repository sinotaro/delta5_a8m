function generateId() {
  return "mod_" + Math.random().toString(36).slice(2, 9);
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function parseCSV(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return null;
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g, ""));
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ""; });
    return obj;
  });
  return { headers, rows };
}

function toNum(v) {
  if (v === undefined || v === null || v === "" || v === "無" || v === "-") return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
}

function evaluateFormula(formula, vars) {
  try {
    let expr = formula;
    // Map all variable names to safe JS identifiers via a lookup object
    const safeVars = {};
    const keyMap = {};
    Object.keys(vars).forEach((k, i) => {
      const safe = "_v" + i;
      keyMap[k] = safe;
      safeVars[safe] = toNum(vars[k]);
    });
    // Replace variable names in expression (longest first to avoid partial matches)
    const sortedKeys = Object.keys(keyMap).sort((a, b) => b.length - a.length);
    sortedKeys.forEach(k => {
      // Replace whole-word occurrences only
      expr = expr.split(k).join(keyMap[k]);
    });
    // Replace avg(a,b,c) with arithmetic mean
    expr = expr.replace(/avg\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `((${parts.join("+")})*1/${parts.length})`;
    });
    expr = expr.replace(/max\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `Math.max(${parts.join(",")})`;
    });
    expr = expr.replace(/min\(([^)]+)\)/g, (_, args) => {
      const parts = args.split(",").map(a => a.trim());
      return `Math.min(${parts.join(",")})`;
    });
    const fn = new Function(...Object.keys(safeVars), `return (${expr});`);
    const result = fn(...Object.values(safeVars));
    return isNaN(result) || !isFinite(result) ? 0 : result;
  } catch {
    return 0;
  }
}

function runAnalysis(csvData, modules) {
  const enabledModules = modules.filter(m => m.enabled);
  const results = csvData.rows.map(row => {
    const vars = { ...row };
    const moduleScores = {};
    for (const mod of enabledModules) {
      const score = evaluateFormula(mod.formula, { ...vars, ...moduleScores });
      moduleScores[mod.outputVar] = score;
    }
    const total = moduleScores["total_score"] ?? 0;
    return { row, moduleScores, total };
  });
  results.sort((a, b) => b.total - a.total);
  return results.map((r, i) => ({ ...r, rank: i + 1 }));
}

function validateFormula(formula, modules, currentId) {
  const errors = [];
  // Check parens
  let depth = 0;
  for (const ch of formula) {
    if (ch === "(") depth++;
    if (ch === ")") depth--;
    if (depth < 0) { errors.push("括弧の対応が不一致"); break; }
  }
  if (depth !== 0) errors.push("括弧の対応が不一致");
  // Check circular (simple: outputVar used in own formula)
  const mod = modules.find(m => m.id === currentId);
  if (mod && formula.includes(mod.outputVar)) errors.push("循環参照の可能性");
  // Check OFF module reference
  for (const m of modules) {
    if (!m.enabled && m.id !== currentId && formula.includes(m.outputVar)) {
      errors.push(`OFFモジュール "${m.name}" を参照している`);
    }
  }
  return errors;
}

// Parse result CSV/text: extracts rows of {finishRank, horseNumber, horseName}
// Accepts CSV with headers containing 着順/馬番/馬名, or tab/space separated race result text
function parseResultData(text) {
  const lines = text.trim().split("\n").map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return null;

  // Try CSV with headers first
  const firstLine = lines[0];
  if (firstLine.includes("着順") && (firstLine.includes("馬名") || firstLine.includes("馬番"))) {
    const delim = firstLine.includes(",") ? "," : "\t";
    const headers = firstLine.split(delim).map(h => h.trim());
    const idxRank = headers.findIndex(h => h.includes("着順"));
    const idxNum = headers.findIndex(h => h === "馬番" || h.includes("馬番"));
    const idxName = headers.findIndex(h => h.includes("馬名"));
    const order = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = lines[i].split(delim).map(c => c.trim());
      const rank = parseInt(cells[idxRank]);
      if (isNaN(rank)) continue;
      order.push({
        finishRank: rank,
        horseNumber: idxNum >= 0 ? cells[idxNum] : "",
        horseName: idxName >= 0 ? cells[idxName] : "",
      });
    }
    return order.length > 0 ? order : null;
  }

  // Fallback: free-text lines like "1 枠8桃 17 ロブチェン 牡3 ..."
  const order = [];
  for (const line of lines) {
    const m = line.match(/^(\d{1,2})\s+(?:枠\d+\S*\s+)?(\d{1,2})\s+(\S+)/);
    if (m) {
      order.push({ finishRank: parseInt(m[1]), horseNumber: m[2], horseName: m[3] });
    }
  }
  return order.length >= 3 ? order : null;
}

// Match result order against history entries by horse name overlap; returns best raceId or null
function matchResultToHistory(order, history) {
  const names = new Set(order.map(o => o.horseName));
  let best = null, bestScore = 0;
  history.forEach(h => {
    const overlap = (h.predictions || []).filter(p => names.has(p.horseName)).length;
    if (overlap > bestScore) { bestScore = overlap; best = h.raceId; }
  });
  // Require at least 50% overlap
  if (best && bestScore >= Math.max(3, order.length * 0.5)) return best;
  return null;
}

// Spearman rank correlation between predicted ranks and finish ranks
function spearmanCorrelation(pairs) {
  // pairs: [{pred, actual}]
  const n = pairs.length;
  if (n < 3) return null;
  const dSum = pairs.reduce((s, p) => s + Math.pow(p.pred - p.actual, 2), 0);
  return 1 - (6 * dSum) / (n * (n * n - 1));
}

// Compute correlation for one history entry with full result order
function raceCorrelation(h) {
  if (!h.result || !h.result.order || !h.predictions) return null;
  const finishMap = {};
  h.result.order.forEach(o => { finishMap[o.horseName] = o.finishRank; });
  const pairs = h.predictions
    .filter(p => finishMap[p.horseName] !== undefined)
    .map(p => ({ pred: p.rank, actual: finishMap[p.horseName] }));
  return spearmanCorrelation(pairs);
}

// Group history entries by module configuration signature
function moduleSignature(h) {
  if (!h.modules) return "不明";
  return h.modules.map(m => m.name).sort().join(" + ");
}

function FormulaBuilder({ formula, onChange, modules, currentId }) {
  const csvVars = ["PR", "horse_number", "horse_name", "jockey", "weight", "odds", "popular_rank", "total_prize", "wins", "waku_coef", "distance_apt", "baba_apt", "growth_coef", "sire_score", "damsire_score", "pace_coef", "style_coef", "ability_score", "jockey_win_rate", "jockey_place_rate", "run1_class_coef", "run1_finish_coef", "run1_time_index", "run1_agari", "run2_class_coef", "run2_finish_coef", "run2_time_index", "run2_agari", "run3_class_coef", "run3_finish_coef", "run3_time_index", "run3_agari", "run4_class_coef", "run4_finish_coef"];
  const ops = ["+", "-", "*", "/", "(", ")", "avg(", "max(", "min(", ",", ")"];
  const append = (val) => onChange(formula + val);
  const enabledMods = modules.filter(m => m.enabled && m.id !== currentId);
  const errors = validateFormula(formula, modules, currentId);

  return (
    <div>
      <label style={S.label}>計算式</label>
      <textarea style={{ ...S.textarea, minHeight: 70 }} value={formula} onChange={e => onChange(e.target.value)} />

function PredictionTab({ modules, history, setHistory }) {
  const [races, setRaces] = useState([]); // [{key, raceInfo, csvText, csvData, results, saved}]
  const [csvText, setCsvText] = useState("");
  const [error, setError] = useState("");
  const [expanded, setExpanded] = useState({}); // "raceKey-rowIdx" -> bool
  const [openRace, setOpenRace] = useState(null); // which race card is open
  const [overwriteConfirm, setOverwriteConfirm] = useState(false);
  const fileRef = useRef();

  const makeRace = (text) => {
    const parsed = parseCSV(text);
    if (!parsed) return null;
    const first = parsed.rows[0] || {};
    const raceId = first.race_id || first.RaceID || first["レースID"] || ((first["開催日"] || "") + "_" + (first["開催場"] || "") + "_" + (first["レース番号"] || "")) || String(Date.now());
    return {
      key: raceId + "_" + Math.random().toString(36).slice(2,6),
      raceInfo: {
        raceId,
        date: first.race_date || first.開催日 || "—",
        name: first.race_name || first.レース名 || "—",
        place: first.place || first.開催場 || "—",
        count: parsed.rows.length,
      },
      csvText: text,
      csvData: parsed,
      results: null,
      saved: false,
    };
  };

  const loadFromText = () => {
    if (!csvText.trim()) { setError("CSVを入力してください"); return; }
    const race = makeRace(csvText);
    if (!race) { setError("CSVの形式が正しくありません"); return; }
    setError("");
    setRaces(prev => [...prev, race]);
    setCsvText("");
    setOpenRace(race.key);
  };

  const loadFromFiles = (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    setError("");
    let loaded = 0;
    const newRaces = [];
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const race = makeRace(ev.target.result);
        if (race) newRaces.push(race);
        loaded++;
        if (loaded === files.length) {
          if (newRaces.length === 0) { setError("読み込めるCSVがありませんでした"); }
          setRaces(prev => [...prev, ...newRaces]);
          if (newRaces.length === 1) setOpenRace(newRaces[0].key);
        }
      };
      reader.readAsText(file, "utf-8");
    });
    e.target.value = "";
  };

  const predictOne = (key) => {
    setRaces(prev => prev.map(r => r.key === key ? { ...r, results: runAnalysis(r.csvData, modules), saved: false } : r));
  };

  const predictAll = () => {
    setRaces(prev => prev.map(r => ({ ...r, results: runAnalysis(r.csvData, modules), saved: false })));
  };

  const buildEntry = (r) => ({
    raceId: r.raceInfo.raceId,
    raceDate: r.raceInfo.date,
    raceName: r.raceInfo.name,
    racePlace: r.raceInfo.place,
    csvText: r.csvText,
    predictions: r.results.map(x => ({
      rank: x.rank,
      horseName: x.row["馬名"] || x.row.horse_name || "—",
      horseNumber: x.row["馬番"] || x.row.horse_number || "—",
      total: x.total,
      moduleScores: x.moduleScores,
    })),
    modules: modules.filter(m => m.enabled).map(m => ({ name: m.name, outputVar: m.outputVar, formula: m.formula })),
    resultEntered: false,
    result: null,
    savedAt: new Date().toISOString(),
  });

  const saveAll = () => {
    const ready = races.filter(r => r.results && !r.saved);
    if (ready.length === 0) { setError("保存できる予想がありません（先に予想実行してください）"); return; }
    const dup = ready.filter(r => history.find(h => h.raceId === r.raceInfo.raceId));
    if (dup.length > 0 && !overwriteConfirm) {
      setError(`${dup.length}件は履歴に存在します。もう一度「一括保存」を押すと上書きします`);
      setOverwriteConfirm(true);
      return;
    }
    let updated = [...history];
    ready.forEach(r => {
      const entry = buildEntry(r);
      const idx = updated.findIndex(h => h.raceId === entry.raceId);
      if (idx >= 0) updated[idx] = entry;
      else updated = [entry, ...updated];
    });
    setHistory(updated);
    saveStorage(STORAGE_KEYS.history, updated);
    setRaces(prev => prev.map(r => ready.find(x => x.key === r.key) ? { ...r, saved: true } : r));
    setError("");
    setOverwriteConfirm(false);
  };

  const saveOne = (key) => {
    const r = races.find(x => x.key === key);
    if (!r || !r.results) return;
    const entry = buildEntry(r);
    const idx = history.findIndex(h => h.raceId === entry.raceId);
    const updated = idx >= 0
      ? history.map((h, i) => i === idx ? entry : h)
      : [entry, ...history];
    setHistory(updated);
    saveStorage(STORAGE_KEYS.history, updated);
    setRaces(prev => prev.map(x => x.key === key ? { ...x, saved: true } : x));
  };

  const removeRace = (key) => {
    setRaces(prev => prev.filter(r => r.key !== key));
    if (openRace === key) setOpenRace(null);
  };

  const toggleRow = (raceKey, i) => {
    const k = raceKey + "-" + i;
    setExpanded(p => ({ ...p, [k]: !p[k] }));
  };

  const allPredicted = races.length > 0 && races.every(r => r.results);
  const unsavedCount = races.filter(r => r.results && !r.saved).length;

  return (
    <div style={S.page}>
      <div style={S.section}>
        <label style={S.label}>CSVテキスト貼り付け（1レース分）</label>
        <textarea style={{ ...S.textarea, minHeight: 80 }} value={csvText} onChange={e => setCsvText(e.target.value)} placeholder={"開催日,開催場,...\n2026年5月31日,東京,..."} />
        <div style={{ ...S.row, gap: 8, marginTop: 6, flexWrap: "wrap" }}>
          <button style={S.btn} onClick={loadFromText}>テキストから追加</button>
          <label style={{ ...S.btn, display: "inline-block" }}>
            ファイル選択（複数可）
            <input ref={fileRef} type="file" accept=".csv" multiple style={{ display: "none" }} onChange={loadFromFiles} />
          </label>
        </div>
      </div>

      {error && <div style={S.error}>{error}</div>}

      {races.length > 0 && (
        <div style={{ ...S.row, gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
          <button style={S.btnPrimary} onClick={predictAll}>一括予想 ({races.length}件)</button>
          <button style={unsavedCount > 0 ? S.btnPrimary : S.btn} onClick={saveAll}>
            {overwriteConfirm ? "もう一度押して上書き" : `一括保存${unsavedCount > 0 ? ` (${unsavedCount}件)` : ""}`}
          </button>
          <button style={S.btn} onClick={() => { setRaces([]); setOpenRace(null); setError(""); }}>全クリア</button>
        </div>
      )}

      {races.length === 0 && (
        <div style={{ color: "#888", fontSize: 13, textAlign: "center", padding: "30px 0" }}>
          CSVを追加するとここにレース一覧が表示されます
        </div>
      )}

      {races.map(r => (
        <div key={r.key} style={{ ...S.card, padding: 0, marginBottom: 10 }}>
          <div style={{ padding: "10px 12px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}
            onClick={() => setOpenRace(openRace === r.key ? null : r.key)}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 13 }}>{r.raceInfo.name}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>
                {r.raceInfo.date} · {r.raceInfo.place} · {r.raceInfo.count}頭
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {r.saved && <span style={{ fontSize: 11, border: "1px solid #111", padding: "1px 6px" }}>保存済</span>}
              {r.results && !r.saved && <span style={{ fontSize: 11, border: "1px solid #999", padding: "1px 6px", color: "#666" }}>予想済</span>}
              <span style={{ fontSize: 11, color: "#999" }}>{openRace === r.key ? "▲" : "▼"}</span>
            </div>
          </div>

          {openRace === r.key && (
            <div style={{ borderTop: "1px solid #eee", padding: "10px 12px" }}>
              <div style={{ ...S.row, gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
                <button style={S.btnSmallFill} onClick={() => predictOne(r.key)}>予想実行</button>
                <button style={S.btnSmall} onClick={() => saveOne(r.key)} disabled={!r.results}>
                  {r.saved ? "保存済 ✓" : "保存"}
                </button>
                <button style={S.btnSmall} onClick={() => removeRace(r.key)}>一覧から削除</button>
              </div>

              {r.results && (
                <div>
                  <div style={{ ...S.row, fontWeight: 700, fontSize: 12, padding: "4px 0", borderBottom: "1px solid #ccc" }}>
                    <span style={{ width: 32 }}>順位</span>
                    <span style={{ width: 36 }}>馬番</span>
                    <span style={{ flex: 1 }}>馬名</span>
                    <span style={{ width: 70, textAlign: "right" }}>スコア</span>
                  </div>
                  {r.results.map((x, i) => (
                    <div key={i}>
                      <div style={{ ...S.row, padding: "7px 0", borderBottom: "1px solid #eee", cursor: "pointer" }} onClick={() => toggleRow(r.key, i)}>
                        <span style={{ width: 32, fontWeight: 700, fontSize: 14 }}>{x.rank}</span>
                        <span style={{ width: 36 }}>{x.row["馬番"] || x.row.horse_number || "—"}</span>
                        <span style={{ flex: 1, fontSize: 13 }}>{x.row["馬名"] || x.row.horse_name || "—"}</span>
                        <span style={{ width: 70, textAlign: "right", fontFamily: "monospace", fontSize: 12 }}>{x.total.toFixed(1)}</span>
                        <span style={{ fontSize: 10, color: "#999", marginLeft: 4 }}>{expanded[r.key + "-" + i] ? "▲" : "▼"}</span>
                      </div>
                      {expanded[r.key + "-" + i] && (
                        <div style={{ background: "#f9f9f9", border: "1px solid #eee", padding: "8px 12px", marginBottom: 4, fontSize: 12 }}>
                          <div style={{ fontWeight: 700, marginBottom: 4 }}>モジュール別スコア</div>
                          {Object.entries(x.moduleScores).map(([k, v]) => (
                            <div key={k} style={{ ...S.row, justifyContent: "space-between", padding: "2px 0" }}>
                              <span style={{ color: "#555" }}>{k}</span>
                              <span style={{ fontFamily: "monospace" }}>{Number(v).toFixed(4)}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ============================================================
// TAB 2: 分析設定
// ============================================================
function SettingsTab({ modules, setModules }) {
  const [profile, setProfile] = useState(() => loadStorage(STORAGE_KEYS.profile, INITIAL_PROFILE));
  const [editMod, setEditMod] = useState(null); // module being edited
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [profileMsg, setProfileMsg] = useState("");
  const [initConfirm, setInitConfirm] = useState(false);

  const saveProfile = () => {
    const p = { ...profile, savedAt: new Date().toISOString(), version: profile.version };
    setProfile(p);
    saveStorage(STORAGE_KEYS.profile, p);
    saveStorage(STORAGE_KEYS.modules, modules);
    setProfileMsg("保存しました");
    setTimeout(() => setProfileMsg(""), 2000);
  };

  const initProfile = () => {
    if (!initConfirm) { setInitConfirm(true); setTimeout(() => setInitConfirm(false), 3000); return; }
    setModules(DEFAULT_MODULES);
    const p = { ...INITIAL_PROFILE, savedAt: null };
    setProfile(p);
    saveStorage(STORAGE_KEYS.modules, DEFAULT_MODULES);
    saveStorage(STORAGE_KEYS.profile, p);
    setInitConfirm(false);
  };

  const toggleModule = (id) => {
    setModules(prev => prev.map(m => m.id === id ? { ...m, enabled: !m.enabled } : m));
  };

  const duplicateModule = (mod) => {
    const newMod = { ...mod, id: generateId(), name: mod.name + " (複製)", outputVar: mod.outputVar + "_copy" };
    setModules(prev => [...prev, newMod]);
  };

  const deleteModule = (id) => {
    setModules(prev => prev.filter(m => m.id !== id));
    setConfirmDelete(null);
  };

  const addModule = () => {
    const newMod = { id: generateId(), name: "新しいモジュール", version: "1.0", enabled: false, description: "", outputVar: "new_score", formula: "0" };
    setEditMod(newMod);
  };

  const saveModule = (mod) => {
    const errors = validateFormula(mod.formula, modules, mod.id);
    if (errors.length > 0) { return; } // errors are displayed in the formula builder
    setModules(prev => {
      const exists = prev.find(m => m.id === mod.id);
      return exists ? prev.map(m => m.id === mod.id ? mod : m) : [...prev, mod];
    });
    setEditMod(null);
  };

  return (
    <div style={S.page}>
      {/* Profile */}
      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>分析プロファイル</div>
        <div style={{ marginBottom: 6 }}>
          <label style={S.label}>プロファイル名</label>
          <input style={S.input} value={profile.name} onChange={e => setProfile(p => ({ ...p, name: e.target.value }))} />
        </div>
        <div style={{ marginBottom: 6 }}>
          <label style={S.label}>分析Version</label>
          <input style={S.input} value={profile.version} onChange={e => setProfile(p => ({ ...p, version: e.target.value }))} />
        </div>
        <div style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>保存日時: {formatDate(profile.savedAt)}</div>
        <div style={{ ...S.row, gap: 8 }}>
          <button style={S.btnPrimary} onClick={saveProfile}>設定保存</button>
          <button style={S.btn} onClick={initProfile}>{initConfirm ? "もう一度押して初期化" : "初期化"}</button>
          {profileMsg && <span style={{ fontSize: 12, fontWeight: 700 }}>{profileMsg}</span>}
        </div>
      </div>

      {/* Module list */}
      <div style={{ ...S.row, justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontWeight: 700 }}>モジュール一覧</span>
        <button style={S.btnSmallFill} onClick={addModule}>＋ 追加</button>
      </div>
      {modules.map(mod => (
        <div key={mod.id} style={{ ...S.card, padding: "8px 12px" }}>
          <div style={{ ...S.row, justifyContent: "space-between" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 13 }}>{mod.name} <span style={{ fontSize: 11, color: "#888" }}>v{mod.version}</span></div>
              <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{mod.outputVar}</div>
              {mod.description && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{mod.description}</div>}
            </div>
            <div style={{ ...S.row, gap: 6, alignItems: "center" }}>
              <button style={{ ...S.btnSmall, fontSize: 11, padding: "3px 8px", background: mod.enabled ? "#111" : "#fff", color: mod.enabled ? "#fff" : "#111" }} onClick={() => toggleModule(mod.id)}>
                {mod.enabled ? "ON" : "OFF"}
              </button>
            </div>
          </div>
          <div style={{ ...S.row, gap: 6, marginTop: 8 }}>
            <button style={S.btnSmall} onClick={() => setEditMod({ ...mod })}>編集</button>
            <button style={S.btnSmall} onClick={() => duplicateModule(mod)}>複製</button>
            <button style={S.btnSmall} onClick={() => setConfirmDelete(mod.id)}>削除</button>
          </div>
        </div>
      ))}

      {/* Edit Modal */}
      {editMod && (
        <Modal title={editMod.id.startsWith("mod_") && modules.find(m => m.id === editMod.id) ? "モジュール編集" : "モジュール追加"} onClose={() => setEditMod(null)}>
          <ModuleEditor mod={editMod} onChange={setEditMod} modules={modules} onSave={saveModule} onCancel={() => setEditMod(null)} />
        </Modal>
      )}

      {/* Delete Confirm */}
      {confirmDelete && (
        <Modal title="削除確認" onClose={() => setConfirmDelete(null)}>
          <p style={{ fontSize: 13 }}>このモジュールを削除しますか？</p>
          <div style={{ ...S.row, gap: 8 }}>
            <button style={S.btnPrimary} onClick={() => deleteModule(confirmDelete)}>削除</button>
            <button style={S.btn} onClick={() => setConfirmDelete(null)}>キャンセル</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ModuleEditor({ mod, onChange, modules, onSave, onCancel }) {
  const errors = validateFormula(mod.formula, modules, mod.id);
  return (
    <div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>名称</label>
        <input style={S.input} value={mod.name} onChange={e => onChange(m => ({ ...m, name: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>Version</label>
        <input style={S.input} value={mod.version} onChange={e => onChange(m => ({ ...m, version: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>出力変数名</label>
        <input style={S.input} value={mod.outputVar} onChange={e => onChange(m => ({ ...m, outputVar: e.target.value }))} />
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>説明</label>
        <input style={S.input} value={mod.description} onChange={e => onChange(m => ({ ...m, description: e.target.value }))} />
      </div>
      <div style={S.divider} />
      <FormulaBuilder formula={mod.formula} onChange={f => onChange(m => ({ ...m, formula: f }))} modules={modules} currentId={mod.id} />
      <div style={S.divider} />
      <div style={{ ...S.row, gap: 8 }}>
        <button style={{ ...S.btnPrimary, opacity: errors.length > 0 ? 0.4 : 1 }} onClick={() => onSave(mod)} disabled={errors.length > 0}>保存</button>
        <button style={S.btn} onClick={onCancel}>キャンセル</button>
      </div>
    </div>
  );
}

// ============================================================
// TAB 3: 履歴
// ============================================================
function HistoryTab({ modules, history, setHistory }) {
  const [expanded, setExpanded] = useState({});
  const [resultInput, setResultInput] = useState(null);
  const [reanalysis, setReanalysis] = useState({});

  const toggle = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));

  const saveResult = (raceId, data) => {
    const updated = history.map(h => h.raceId === raceId ? { ...h, result: data, resultEntered: true } : h);
    setHistory(updated);
    saveStorage(STORAGE_KEYS.history, updated);
    setResultInput(null);
  };

  const exportCSV = (h) => {
    const blob = new Blob([h.csvText], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `race_${h.raceId}.csv`;
    a.click();
  };

  const runReanalysis = (h) => {
    const parsed = parseCSV(h.csvText);
    if (!parsed) return;
    const res = runAnalysis(parsed, modules);
    setReanalysis(p => ({ ...p, [h.raceId]: res }));
  };

  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const deleteHistory = (raceId) => {
    if (deleteConfirm !== raceId) {
      setDeleteConfirm(raceId);
      setTimeout(() => setDeleteConfirm(null), 3000);
      return;
    }
    const updated = history.filter(h => h.raceId !== raceId);
    setHistory(updated);
    saveStorage(STORAGE_KEYS.history, updated);
    setDeleteConfirm(null);
  };

  const exportAll = () => {
    const blob = new Blob([JSON.stringify(history, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "keiba_history.json";
    a.click();
  };

  const importAll = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        // Merge by raceId (imported wins)
        const merged = [...data];
        history.forEach(h => { if (!merged.find(m => m.raceId === h.raceId)) merged.push(h); });
        setHistory(merged);
        saveStorage(STORAGE_KEYS.history, merged);
      } catch {
        // invalid file, ignore
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const [resultText, setResultText] = useState("");
  const [resultMsg, setResultMsg] = useState("");
  const [showResultImport, setShowResultImport] = useState(false);

  const importResult = () => {
    const order = parseResultData(resultText);
    if (!order) { setResultMsg("✗ 結果データを解析できませんでした"); return; }
    const raceId = matchResultToHistory(order, history);
    if (!raceId) { setResultMsg("✗ 対応するレースが履歴に見つかりません（馬名が一致しない）"); return; }
    const sorted = [...order].sort((a, b) => a.finishRank - b.finishRank);
    const result = {
      first: sorted[0]?.horseName || "",
      second: sorted[1]?.horseName || "",
      third: sorted[2]?.horseName || "",
      order: sorted,
    };
    const updated = history.map(h => h.raceId === raceId ? { ...h, result, resultEntered: true } : h);
    setHistory(updated);
    saveStorage(STORAGE_KEYS.history, updated);
    const race = history.find(h => h.raceId === raceId);
    setResultMsg(`✓ 「${race?.raceName}」に結果を反映しました（${sorted.length}頭）`);
    setResultText("");
  };

  const importResultFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setResultText(ev.target.result); };
    reader.readAsText(file, "utf-8");
    e.target.value = "";
  };

  const importExportBar = (
    <div style={{ ...S.row, gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
      <button style={S.btnSmall} onClick={exportAll}>履歴エクスポート (JSON)</button>
      <label style={{ ...S.btnSmall, display: "inline-block" }}>
        履歴インポート
        <input type="file" accept=".json" style={{ display: "none" }} onChange={importAll} />
      </label>
    </div>
  );

  if (history.length === 0) return (
    <div style={S.page}>
      {importExportBar}
      <div style={{ color: "#888", textAlign: "center", paddingTop: 40 }}>
        <div style={{ fontSize: 14 }}>保存された履歴はありません</div>
        <div style={{ fontSize: 12, marginTop: 8 }}>予想タブで「予想保存」を押すとここに表示されます</div>
        <div style={{ fontSize: 11, marginTop: 12, color: "#aaa" }}>※ データはセッション中のみ保持されます。JSONエクスポートで保存してください</div>
      </div>
    </div>
  );

  return (
    <div style={S.page}>
      {importExportBar}

      <div style={{ ...S.card, marginBottom: 14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }} onClick={() => setShowResultImport(!showResultImport)}>
          <span style={{ fontWeight: 700, fontSize: 13 }}>レース結果の自動取込</span>
          <span style={{ fontSize: 11, color: "#999" }}>{showResultImport ? "▲" : "▼"}</span>
        </div>
        {showResultImport && (
          <div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>
              結果CSV（着順・馬番・馬名の列を含む）またはJRA結果テキストを貼り付け。馬名から自動でレースを特定して反映します。
            </div>
            <textarea style={{ ...S.textarea, minHeight: 80 }} value={resultText} onChange={e => setResultText(e.target.value)}
              placeholder={"着順,馬番,馬名\n1,17,ロブチェン\n2,13,パントルナイーフ\n..."} />
            <div style={{ ...S.row, gap: 8, marginTop: 6, flexWrap: "wrap" }}>
              <button style={S.btnSmallFill} onClick={importResult}>結果を反映</button>
              <label style={{ ...S.btnSmall, display: "inline-block" }}>
                ファイル選択
                <input type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={importResultFile} />
              </label>
            </div>
            {resultMsg && <div style={{ fontSize: 12, marginTop: 8, padding: "6px 10px", border: "1px solid #ccc", background: "#f9f9f9" }}>{resultMsg}</div>}
          </div>
        )}
      </div>

      <div style={{ fontWeight: 700, marginBottom: 10 }}>履歴一覧 ({history.length}件)</div>
      {history.map(h => (
        <div key={h.raceId} style={{ ...S.card, padding: 0 }}>
          <div style={{ padding: "10px 12px", cursor: "pointer" }} onClick={() => toggle(h.raceId)}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <div>
                <span style={{ fontWeight: 600 }}>{h.raceName}</span>
                <span style={{ fontSize: 11, color: "#888", marginLeft: 8 }}>{h.raceDate}</span>
              </div>
              <span style={{ fontSize: 11, border: "1px solid #ccc", padding: "1px 6px" }}>{h.resultEntered ? "結果入力済" : "未入力"}</span>
            </div>
            <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>ID: {h.raceId} · {h.savedAt ? formatDate(h.savedAt) : "—"}</div>
          </div>
          {expanded[h.raceId] && (
            <div style={{ borderTop: "1px solid #eee", padding: "10px 12px" }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>予想順位</div>
              {(h.predictions || []).slice(0, 5).map((p, i) => (
                <div key={i} style={{ ...S.row, fontSize: 12, padding: "2px 0" }}>
                  <span style={{ width: 24, fontWeight: 700 }}>{p.rank}</span>
                  <span style={{ flex: 1 }}>{p.horseName}</span>
                  <span style={{ fontFamily: "monospace", color: "#555" }}>{Number(p.total).toFixed(2)}</span>
                </div>
              ))}
              {h.result && (
                <div style={{ marginTop: 8, fontSize: 12 }}>
                  <span style={{ fontWeight: 700 }}>結果: </span>
                  1着 {h.result.first} / 2着 {h.result.second} / 3着 {h.result.third}
                </div>
              )}

              {/* Re-analysis */}
              {reanalysis[h.raceId] && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 4 }}>再分析結果</div>
                  {reanalysis[h.raceId].slice(0, 5).map((r, i) => {
                    const orig = (h.predictions || []).find(p => p.horseName === (r.row.horse_name || r.row.馬名));
                    const origRank = orig ? orig.rank : "—";
                    const diff = orig ? origRank - r.rank : 0;
                    return (
                      <div key={i} style={{ ...S.row, fontSize: 12, padding: "2px 0" }}>
                        <span style={{ width: 24, fontWeight: 700 }}>{r.rank}</span>
                        <span style={{ flex: 1 }}>{r.row.horse_name || r.row.馬名}</span>
                        <span style={{ fontFamily: "monospace", color: "#555" }}>{r.total.toFixed(2)}</span>
                        <span style={{ fontSize: 11, marginLeft: 6 }}>({origRank}→{r.rank} {diff > 0 ? "+" : ""}{diff !== 0 ? diff : ""})</span>
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ ...S.row, gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                <button style={S.btnSmall} onClick={() => setResultInput(h)}>結果入力</button>
                <button style={S.btnSmall} onClick={() => runReanalysis(h)}>再分析</button>
                <button style={S.btnSmall} onClick={() => exportCSV(h)}>CSV出力</button>
                <button style={S.btnSmall} onClick={() => deleteHistory(h.raceId)}>{deleteConfirm === h.raceId ? "もう一度押して削除" : "削除"}</button>
              </div>
            </div>
          )}
        </div>
      ))}

      {resultInput && (
        <Modal title="結果入力" onClose={() => setResultInput(null)}>
          <ResultInputForm h={resultInput} onSave={saveResult} onCancel={() => setResultInput(null)} />
        </Modal>
      )}
    </div>
  );
}

function ResultInputForm({ h, onSave, onCancel }) {
  const [first, setFirst] = useState(h.result?.first || "");
  const [second, setSecond] = useState(h.result?.second || "");
  const [third, setThird] = useState(h.result?.third || "");
  return (
    <div>
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>{h.raceName}</div>
      {[["1着", first, setFirst], ["2着", second, setSecond], ["3着", third, setThird]].map(([label, val, setter]) => (
        <div key={label} style={{ marginBottom: 8 }}>
          <label style={S.label}>{label}</label>
          <input style={S.input} value={val} onChange={e => setter(e.target.value)} placeholder="馬名" />
        </div>
      ))}
      <div style={{ ...S.row, gap: 8, marginTop: 12 }}>
        <button style={S.btnPrimary} onClick={() => onSave(h.raceId, { first, second, third })}>保存</button>
        <button style={S.btn} onClick={onCancel}>キャンセル</button>
      </div>
    </div>
  );
}

// ============================================================
// TAB 4: 累積分析
// ============================================================
function AccumulationTab({ history }) {
  const entered = history.filter(h => h.resultEntered && h.result);
  const total = history.length;
  const enteredCount = entered.length;

  let pred1Win = 0, pred3Win = 0, pred5Win = 0;
  let top3Capture = 0, top5Capture = 0;
  let rankErrors = [];

  entered.forEach(h => {
    const preds = h.predictions || [];
    const result = h.result;
    const winners = [result.first, result.second, result.third].filter(Boolean);
    const top1 = preds.find(p => p.rank === 1);
    if (top1 && result.first === top1.horseName) pred1Win++;
    const top3Names = preds.filter(p => p.rank <= 3).map(p => p.horseName);
    if (top3Names.includes(result.first)) pred3Win++;
    const top5Names = preds.filter(p => p.rank <= 5).map(p => p.horseName);
    if (top5Names.includes(result.first)) pred5Win++;
    winners.forEach(w => {
      const found = preds.find(p => p.horseName === w);
      if (found) { if (found.rank <= 3) top3Capture++; if (found.rank <= 5) top5Capture++; }
    });
    const winFound = preds.find(p => p.horseName === result.first);
    if (winFound) rankErrors.push(winFound.rank);
  });

  const pct = (n, d) => d === 0 ? "—" : (n / d * 100).toFixed(1) + "%";
  const avgErr = rankErrors.length > 0 ? (rankErrors.reduce((a, b) => a + b, 0) / rankErrors.length).toFixed(1) : "—";

  // Correlation analysis (requires full result order)
  const withOrder = entered.filter(h => h.result.order && h.result.order.length >= 3);
  const correlations = withOrder.map(h => ({ h, corr: raceCorrelation(h) })).filter(x => x.corr !== null);
  const avgCorr = correlations.length > 0
    ? (correlations.reduce((s, x) => s + x.corr, 0) / correlations.length)
    : null;

  // Group by module configuration
  const groups = {};
  correlations.forEach(({ h, corr }) => {
    const sig = moduleSignature(h);
    if (!groups[sig]) groups[sig] = { corrs: [], wins: 0, races: 0 };
    groups[sig].corrs.push(corr);
    groups[sig].races++;
    const top1 = (h.predictions || []).find(p => p.rank === 1);
    if (top1 && h.result.first === top1.horseName) groups[sig].wins++;
  });

  const stats = [
    ["保存レース数", total + "件"],
    ["結果入力済み", enteredCount + "件"],
    ["予想1位勝率", pct(pred1Win, enteredCount)],
    ["予想TOP3勝率", pct(pred3Win, enteredCount)],
    ["予想TOP5勝率", pct(pred5Win, enteredCount)],
    ["TOP3内好走馬捕捉率", pct(top3Capture, entered.length * 3)],
    ["TOP5内好走馬捕捉率", pct(top5Capture, entered.length * 3)],
    ["勝ち馬の平均予想順位", avgErr === "—" ? "—" : avgErr + "位"],
  ];

  const corrLabel = (c) => {
    if (c === null) return "—";
    const v = c.toFixed(3);
    if (c >= 0.7) return v + "（強い相関）";
    if (c >= 0.4) return v + "（中程度）";
    if (c >= 0.2) return v + "（弱い）";
    return v + "（ほぼ無相関）";
  };

  return (
    <div style={S.page}>
      <div style={{ fontWeight: 700, marginBottom: 12 }}>累積分析</div>
      {enteredCount === 0 && (
        <div style={{ color: "#888", fontSize: 13, marginBottom: 16 }}>結果入力済みレースがありません。履歴タブで結果を取り込んでください。</div>
      )}

      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>的中サマリー</div>
        {stats.map(([k, v]) => (
          <div key={k} style={{ ...S.row, justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #eee" }}>
            <span style={{ fontSize: 13, color: "#444" }}>{k}</span>
            <span style={{ fontWeight: 700, fontSize: 14, fontFamily: "monospace" }}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{ ...S.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>予想順位×着順 相関分析</div>
        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>
          スピアマン順位相関。1.0に近いほど予想順位どおりに決着している。全着順データがあるレースのみ対象（{withOrder.length}件）。
        </div>
        <div style={{ ...S.row, justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #eee" }}>
          <span style={{ fontSize: 13, color: "#444" }}>全体平均相関</span>
          <span style={{ fontWeight: 700, fontSize: 14, fontFamily: "monospace" }}>{corrLabel(avgCorr)}</span>
        </div>
        {correlations.slice(0, 10).map(({ h, corr }) => (
          <div key={h.raceId} style={{ ...S.row, justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #f3f3f3" }}>
            <span style={{ fontSize: 12, color: "#666", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{h.raceName}</span>
            <span style={{ fontFamily: "monospace", fontSize: 13 }}>{corr.toFixed(3)}</span>
          </div>
        ))}
      </div>

      {Object.keys(groups).length > 0 && (
        <div style={{ ...S.card, marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>モジュール構成別パフォーマンス</div>
          <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>
            分析設定を変えて予想したレースを構成ごとに比較。相関が高い構成ほど予想精度が高い。
          </div>
          {Object.entries(groups).map(([sig, g]) => {
            const avg = g.corrs.reduce((a, b) => a + b, 0) / g.corrs.length;
            return (
              <div key={sig} style={{ borderBottom: "1px solid #eee", padding: "8px 0" }}>
                <div style={{ fontSize: 11, color: "#555", marginBottom: 4 }}>{sig}</div>
                <div style={{ ...S.row, gap: 14, fontSize: 12 }}>
                  <span>件数: <b>{g.races}</b></span>
                  <span>平均相関: <b style={{ fontFamily: "monospace" }}>{avg.toFixed(3)}</b></span>
                  <span>1位勝率: <b>{pct(g.wins, g.races)}</b></span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ fontSize: 11, color: "#888" }}>
        ヒント: 分析設定でモジュールや式を変更→履歴から「再分析」→結果と比較することで、どの構成が相関を上げるか検証できます。
      </div>
    </div>
  );
}

// ============================================================
// TAB 5: データ管理 (Supabase)
// ============================================================
function DataTab({ history, onHistoryLoaded }) {
  const [cloudRecords, setCloudRecords] = useState(null);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const showMsg = (m, ms=4000) => { setMsg(m); setTimeout(() => setMsg(""), ms); };

  const fetchCloud = async () => {
    setLoading(true);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/history?select=race_id,data,updated_at&order=updated_at.desc`, { headers: sbHeaders });
      if (!res.ok) throw new Error(await res.text());
      const rows = await res.json();
      setCloudRecords(rows);
      showMsg(`✓ ${rows.length}件 取得`);
    } catch(e) { showMsg("✗ 取得失敗: " + e.message); }
    setLoading(false);
  };

  useEffect(() => { fetchCloud(); }, []);

  const deleteCloud = async (raceId) => {
    if (deleteConfirm !== raceId) {
      setDeleteConfirm(raceId);
      setTimeout(() => setDeleteConfirm(null), 3000);
      return;
    }
    setLoading(true);
    try {
      await sbDeleteHistory(raceId);
      setCloudRecords(prev => prev.filter(r => r.race_id !== raceId));
      showMsg("✓ 削除しました");
    } catch(e) { showMsg("✗ 削除失敗: " + e.message); }
    setLoading(false);
    setDeleteConfirm(null);
  };

  const loadToApp = () => {
    if (!cloudRecords) return;
    const data = cloudRecords.map(r => r.data);
    const merged = [...data];
    history.forEach(h => { if (!merged.find(m => m.raceId === h.raceId)) merged.push(h); });
    onHistoryLoaded(merged);
    showMsg(`✓ ${data.length}件 アプリに読み込みました`);
  };

  const totalSize = cloudRecords ? JSON.stringify(cloudRecords).length : 0;

  return (
    <div style={S.page}>
      <div style={{ ...S.row, justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontWeight: 700 }}>クラウドデータ管理</span>
        <button style={S.btnSmall} onClick={fetchCloud} disabled={loading}>{loading ? "取得中..." : "↻ 更新"}</button>
      </div>

      {msg && <div style={{ fontSize: 12, padding: "6px 10px", border: "1px solid #ccc", background: "#f9f9f9", marginBottom: 10 }}>{msg}</div>}

      {cloudRecords && (
        <div style={{ ...S.card, marginBottom: 14 }}>
          {[["保存レコード数", cloudRecords.length + "件"],
            ["概算データ量", (totalSize/1024).toFixed(1) + " KB / 500 MB"],
            ["アプリ内履歴", history.length + "件"]].map(([k,v]) => (
            <div key={k} style={{ ...S.row, justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #eee" }}>
              <span style={{ fontSize: 12, color: "#666" }}>{k}</span>
              <span style={{ fontWeight: 600, fontSize: 13 }}>{v}</span>
            </div>
          ))}
          <button style={{ ...S.btnSmallFill, marginTop: 10 }} onClick={loadToApp}>すべてアプリに読込</button>
        </div>
      )}

      {cloudRecords && cloudRecords.length === 0 && (
        <div style={{ color: "#888", fontSize: 13, textAlign: "center", padding: "20px 0" }}>
          クラウドにデータはありません。予想タブで保存後、上部の「↑ 保存」を押すとここに表示されます。
        </div>
      )}

      {cloudRecords && cloudRecords.map(r => {
        const d = r.data || {};
        const inApp = history.find(h => h.raceId === r.race_id);
        return (
          <div key={r.race_id} style={{ ...S.card, padding: "8px 12px" }}>
            <div style={{ ...S.row, justifyContent: "space-between" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{d.raceName || r.race_id}</div>
                <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>
                  {d.raceDate} · {formatDate(r.updated_at)}
                  {d.resultEntered && <span style={{ marginLeft: 6, border: "1px solid #999", padding: "0 4px" }}>結果済</span>}
                  {inApp && <span style={{ marginLeft: 6, color: "#444" }}>● アプリ内</span>}
                </div>
              </div>
              <button style={S.btnSmall} onClick={() => deleteCloud(r.race_id)} disabled={loading}>
                {deleteConfirm === r.race_id ? "確認" : "削除"}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// SUPABASE SYNC BAR
// ============================================================
function SupabaseSyncBar({ history, onHistoryLoaded }) {
  const [syncing, setSyncing] = useState(false);
  const [msg, setMsg] = useState("");

  const showMsg = (m, ms=3000) => { setMsg(m); setTimeout(() => setMsg(""), ms); };

  const push = async () => {
    if (history.length === 0) { showMsg("保存する履歴がありません"); return; }
    setSyncing(true);
    try {
      await sbSaveHistory(history);
      showMsg("✓ " + history.length + "件 保存しました");
    } catch(e) { showMsg("✗ 保存失敗: " + e.message); }
    setSyncing(false);
  };

  const pull = async () => {
    setSyncing(true);
    try {
      const data = await sbLoadHistory();
      if (data.length === 0) { showMsg("データがありません"); }
      else {
        const merged = [...data];
        history.forEach(h => { if (!merged.find(m => m.raceId === h.raceId)) merged.push(h); });
        onHistoryLoaded(merged);
        showMsg("✓ " + data.length + "件 読み込みました");
      }
    } catch(e) { showMsg("✗ 読込失敗: " + e.message); }
    setSyncing(false);
  };

  return (
    <div style={{ borderBottom:"1px solid #eee", padding:"6px 16px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", background:"#fafafa" }}>
      <span style={{ fontSize:11, color:"#666" }}>クラウド:</span>
      <button style={{ padding:"4px 10px", border:"1px solid #111", background:"#fff", fontSize:12, cursor:"pointer" }} onClick={pull} disabled={syncing}>↓ 読込</button>
      <button style={{ padding:"4px 10px", border:"none", background:"#111", color:"#fff", fontSize:12, cursor:"pointer" }} onClick={push} disabled={syncing}>↑ 保存</button>
      {syncing && <span style={{ fontSize:11, color:"#888" }}>処理中...</span>}
      {msg && <span style={{ fontSize:11, color:"#333" }}>{msg}</span>}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [tab, setTab] = useState(0);
  const [history, setHistory] = useState([]);
  const [modules, setModules] = useState(() => {
    const saved = loadStorage(STORAGE_KEYS.modules, null);
    if (!saved) return DEFAULT_MODULES;
    const savedIds = new Set(saved.map(m => m.id));
    const missing = DEFAULT_MODULES.filter(m => !savedIds.has(m.id));
    return missing.length > 0 ? [...missing, ...saved] : saved;
  });

  useEffect(() => { saveStorage(STORAGE_KEYS.modules, modules); }, [modules]);

  const handleSetHistory = (h) => {
    setHistory(h);
    saveStorage(STORAGE_KEYS.history, h);
  };

  const tabLabels = ["予想", "設定", "履歴", "分析", "データ"];

  return (
    <div style={S.app}>
      <div style={S.header}>🏇 競馬予想エンジン v3</div>
      <SupabaseSyncBar history={history} onHistoryLoaded={handleSetHistory} />
      <div style={S.tabs}>
        {tabLabels.map((l, i) => (
          <button key={i} style={S.tab(tab === i)} onClick={() => setTab(i)}>{l}</button>
        ))}
      </div>
      {tab === 0 && <PredictionTab modules={modules} history={history} setHistory={handleSetHistory} />}
      {tab === 1 && <SettingsTab modules={modules} setModules={setModules} />}
      {tab === 2 && <HistoryTab modules={modules} history={history} setHistory={handleSetHistory} />}
      {tab === 3 && <AccumulationTab history={history} />}
      {tab === 4 && <DataTab history={history} onHistoryLoaded={handleSetHistory} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
