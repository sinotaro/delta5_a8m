<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相手指標アナライザー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d0f14; --bg2:#151820; --bg3:#1c2030; --border:#2a2f42;
  --accent:#e8b84b; --accent2:#4b8fe8; --text:#dde2f0; --muted:#6b7494;
  --ok:#4bca81; --warn:#e8b84b; --danger:#e8504b;
  --rank1:rgba(232,184,75,0.12); --ranktop:rgba(75,143,232,0.08);
  --font-mono:'Courier New',monospace; --radius:6px;
}
body { background:var(--bg); color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  font-size:14px; line-height:1.6; min-height:100vh; }
header { background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 24px; display:flex; align-items:center; gap:20px;
  height:52px; position:sticky; top:0; z-index:100; }
.app-title { font-size:15px; font-weight:700; letter-spacing:.05em; color:var(--accent); }
.app-version { font-size:11px; color:var(--muted); }
nav { display:flex; gap:2px; margin-left:auto; }
.tab-btn { background:none; border:none; color:var(--muted); padding:6px 16px;
  cursor:pointer; font-size:13px; border-radius:var(--radius); transition:all .15s; }
.tab-btn:hover { color:var(--text); background:var(--bg3); }
.tab-btn.active { color:var(--accent); background:var(--bg3); font-weight:600; }
main { max-width:1100px; margin:0 auto; padding:24px 16px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.card { background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px; margin-bottom:16px; }
.card-title { font-size:11px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
.row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:140px; }
label { font-size:11px; color:var(--muted); letter-spacing:.05em; }
input[type=text],input[type=date],textarea,select {
  background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text); padding:8px 10px; font-size:13px; width:100%;
  transition:border-color .15s; font-family:inherit; }
input:focus,textarea:focus,select:focus { outline:none; border-color:var(--accent2); }
textarea { resize:vertical; min-height:200px; font-family:var(--font-mono);
  font-size:12px; line-height:1.8; }
.btn { padding:8px 18px; border-radius:var(--radius); border:none; cursor:pointer;
  font-size:13px; font-weight:600; transition:all .15s; }
.btn-primary { background:var(--accent); color:#0d0f14; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent2); }
.btn-danger { background:transparent; color:var(--danger); border:1px solid var(--danger); }
.btn-danger:hover { background:rgba(232,80,75,.1); }
.btn-sm { padding:4px 10px; font-size:11px; border-radius:4px; border:1px solid var(--border);
  background:var(--bg3); color:var(--text); cursor:pointer; }
.btn-sm:hover { border-color:var(--accent2); }
.btn-sm.danger { color:var(--danger); border-color:var(--danger); }
.btn-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.format-hint { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
  padding:10px 14px; font-size:11px; margin-bottom:12px; display:flex;
  flex-wrap:wrap; gap:6px; align-items:center; }
.hint-label { color:var(--muted); }
.hint-col { background:var(--bg2); border:1px solid var(--border); border-radius:3px;
  padding:1px 6px; font-family:var(--font-mono); font-size:10px; color:var(--accent2); }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg3); color:var(--muted); font-size:10px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase; padding:8px 12px; text-align:left;
  border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
tr:last-child td { border-bottom:none; }
tr.rank-1 { background:var(--rank1); }
tr.rank-top { background:var(--ranktop); }
tr:hover td { background:rgba(255,255,255,.02); }
.score { font-family:var(--font-mono); font-weight:700; color:var(--accent); font-size:14px; }
.run-cell { font-size:12px; line-height:1.5; }
.run-cell small { color:var(--muted); font-family:var(--font-mono); }
.comment-text { font-size:11px; color:var(--muted); }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px;
  background:var(--bg3); border:1px solid var(--border); color:var(--muted); }
.badge.accent { background:rgba(232,184,75,.15); border-color:var(--accent); color:var(--accent); }
#result-summary { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
#save-bar { display:none; align-items:center; gap:10px; background:rgba(232,184,75,.08);
  border:1px solid rgba(232,184,75,.3); border-radius:var(--radius);
  padding:12px 16px; margin-bottom:16px; flex-wrap:wrap; }
#save-bar label { color:var(--muted); font-size:11px; white-space:nowrap; }
#save-memo { flex:1; min-width:200px; }
.history-grid { display:grid; grid-template-columns:280px 1fr; gap:16px; }
@media (max-width:700px){ .history-grid { grid-template-columns:1fr; } }
.history-item { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
.history-item:hover { border-color:var(--accent2); }
.history-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.history-race { font-weight:600; font-size:13px; }
.history-date { font-size:11px; color:var(--muted); }
.history-meta { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.rank-chip { font-size:10px; padding:2px 7px; border-radius:3px; background:var(--bg2);
  border:1px solid var(--border); color:var(--text); }
.history-actions { display:flex; gap:6px; }
.detail-block h3 { font-size:15px; margin-bottom:14px; }
.detail-block h3 small { color:var(--muted); font-size:12px; margin-left:8px; }
.detail-section { margin-bottom:16px; }
.detail-section b { display:block; font-size:11px; color:var(--muted); letter-spacing:.08em;
  text-transform:uppercase; margin-bottom:6px; }
.detail-section p { font-size:13px; line-height:1.7; }
.coeff-snap,.raw-text { background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); padding:10px 12px; font-family:var(--font-mono);
  font-size:11px; overflow-x:auto; max-height:200px; white-space:pre; color:var(--muted); }
.settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:700px){ .settings-grid { grid-template-columns:1fr; } }
.settings-grid pre { background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px; font-family:var(--font-mono);
  font-size:11px; overflow:auto; max-height:320px; color:var(--muted); white-space:pre; }
.textarea-meta { display:flex; justify-content:flex-end; font-size:11px; color:var(--muted); margin-top:4px; }
#toast-container { position:fixed; bottom:24px; right:24px; z-index:9999;
  display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 18px; border-radius:var(--radius); font-size:13px; font-weight:600;
  animation:slideIn .2s ease; max-width:280px; }
.toast.ok { background:rgba(75,202,129,.15); border:1px solid var(--ok); color:var(--ok); }
.toast.warn { background:rgba(232,184,75,.15); border:1px solid var(--warn); color:var(--warn); }
.toast.error { background:rgba(232,80,75,.15); border:1px solid var(--danger); color:var(--danger); }
@keyframes slideIn { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
.muted { color:var(--muted); }
.center { text-align:center; padding:24px; }
.metric-note { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.7; }
</style>
</head>
<body>

<header>
  <span class="app-title">相手指標アナライザー</span>
  <span class="app-version" id="app-version"></span>
  <nav id="main-nav"></nav>
</header>

<main>
  <div class="tab-panel" id="panel-input">
    <div class="card">
      <div class="card-title">レース情報</div>
      <div class="row">
        <div class="field"><label>レース名</label>
          <input type="text" id="input-race-name" placeholder="例：日本ダービー"></div>
        <div class="field" style="max-width:160px"><label>日付</label>
          <input type="date" id="input-race-date"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">出走馬データ入力</div>
      <div class="format-hint" id="format-hint"></div>
      <textarea id="raw-input" placeholder="# でコメント行。1行1頭、カンマ区切り"></textarea>
      <div class="textarea-meta"><span id="line-count">0頭分</span></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-primary" id="btn-parse">解析する</button>
        <button class="btn btn-secondary" id="btn-sample">サンプル</button>
        <button class="btn btn-secondary" id="btn-clear">クリア</button>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-output">
    <div id="save-bar">
      <label>メモ・反省：</label>
      <input type="text" id="save-memo" placeholder="任意メモ">
      <button class="btn btn-primary" id="btn-save-history">履歴に保存</button>
      <button class="btn btn-secondary" id="btn-copy-result">結果コピー</button>
    </div>
    <div id="result-summary"></div>
    <div class="card">
      <div class="card-title">予想結果</div>
      <div class="table-wrap" id="result-table">
        <p class="muted center">入力タブでデータを解析してください</p>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-history">
    <div class="card">
      <div class="card-title">操作</div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-export-history">エクスポート</button>
        <button class="btn btn-secondary" id="btn-import-history">インポート</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button class="btn btn-danger" id="btn-clear-history">全削除</button>
      </div>
    </div>
    <div class="history-grid">
      <div id="history-list"></div>
      <div id="history-detail"><p class="muted center">左の履歴を選択してください</p></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-settings">
    <div class="card">
      <div class="card-title">現在の指標定義（config内 METRICS を編集で変更）</div>
      <div id="settings-metrics"></div>
      <p class="metric-note">指標を増やすには config の <b>METRICS</b> 配列にブロックを1つ足すだけです。入力列・計算・出力・この画面すべてに自動反映されます。</p>
    </div>
    <div class="card">
      <div class="card-title">入力フォーマット</div>
      <pre id="view-schema" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:var(--font-mono);font-size:11px;overflow:auto;color:var(--muted);white-space:pre;"></pre>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<!-- ════════ CONFIG — 全体制御 ════════ -->
<script>
/* ============================================================
   全体制御 CONFIG
   ・列を増やす → METRICS にブロック追加（入力/計算/出力 全自動追従）
   ・走数を変える → RUNS.count
   ・馬の固定項目を増やす → HORSE_FIELDS に追加
   ============================================================ */

// ── 馬ごとの固定フィールド（CSV先頭から並ぶ） ──
const HORSE_FIELDS = [
  { key:"horse_no",   label:"馬番", showInOutput:true },
  { key:"horse_name", label:"馬名", showInOutput:true },
  { key:"jockey",     label:"騎手", showInOutput:true },
];

// ── 各走で繰り返す指標プラグイン ──
// type:"map"     → scoreMap の係数を引く（格・着順など離散値）
// type:"linear"  → 数値を min..max で0..1正規化（タイム・上がりなど連続値）
// ここに1ブロック足すだけで全機能に反映される
const METRICS = [
  {
    key:"grade", label:"格", type:"map",
    weight:1.0,                 // 指標間の重み
    showRunsInOutput:[1,2,3,4], // この指標を何走目まで出力列に出すか
    none:["無",""],             // 値なし扱い
    scoreMap:{
      "皐月賞":1.000,"ダービー":1.000,"ホープフルS":0.992,"共同通信杯":0.984,
      "弥生賞":0.980,"スプリングS":0.968,"青葉賞":0.960,"京都新聞杯":0.960,
      "毎日杯":0.952,"きさらぎ賞":0.940,"東スポ杯":0.932,"その他G3":0.932,
      "L/OP":0.920,"1勝クラス":0.908,"新馬・未勝利":0.900,"新馬":0.900,"未勝利":0.900,
    },
    // 完全一致しない時のフォールバック
    fallback:(v)=>{
      if(/G3|GIII/.test(v)) return 0.932;
      if(/G2|GII/.test(v))  return 0.970;
      if(/G1|GI/.test(v))   return 1.000;
      if(/L|OP|オープン/.test(v)) return 0.920;
      if(/1勝/.test(v))     return 0.908;
      if(/未勝利|新馬/.test(v)) return 0.900;
      return null;
    },
  },
  {
    key:"finish", label:"着順", type:"map",
    weight:1.0, showRunsInOutput:[1,2,3,4], none:["無",""],
    scoreMap:{ "1":1.000,"2":0.950,"3":0.900,"4":0.850,"5":0.800 },
    fallback:(v)=>{ const n=parseInt(v,10); return (!isNaN(n)&&n>=6)?0.750:null; },
  },

  /* ── 例：タイム指標を追加したいときはコメントを外す ──
  {
    key:"time", label:"タイム", type:"linear",
    weight:0.5, showRunsInOutput:[1,2], none:["無",""],
    // 秒に変換（"1:34.5" → 94.5）。速いほど高スコア
    parse:(v)=>{ const m=v.match(/(\d+):(\d+\.\d+)/); return m? (+m[1])*60+(+m[2]) : (parseFloat(v)||null); },
    min:90, max:130, invert:true,  // min(速)=1.0, max(遅)=0.0
  },
  */
];

// ── 走の設定 ──
const RUNS = {
  count:4,
  labels:["前走","2走前","3走前","4走前"],
  // 走ごとの重み（新しい走ほど重く）。length>=count
  weights:[0.40,0.30,0.20,0.10],
};

// ── アプリ・モジュール制御 ──
const APP_CONFIG = {
  app:{ name:"相手指標アナライザー", version:"2.0.0" },
  modules:{
    input:   { enabled:true, label:"入力", tab:true  },
    process: { enabled:true, label:"処理", tab:false },
    output:  { enabled:true, label:"予想", tab:true  },
    history: { enabled:true, label:"履歴", tab:true  },
    settings:{ enabled:true, label:"設定", tab:true  },
  },
  // 出力の固定列（順位・スコア・コメント）。各走の列は自動生成される
  outputFixed:{ rank:true, score:true, comment:true },
};

/* ── 派生情報（CONFIGから自動計算。手で触らない） ── */
const SCHEMA = (() => {
  // CSV列の並び順を構築：固定フィールド → 各走(METRICS順)
  const csvCols = [];
  HORSE_FIELDS.forEach(f => csvCols.push({ label:f.label, key:f.key, kind:"horse" }));
  for(let r=0; r<RUNS.count; r++){
    METRICS.forEach(m => csvCols.push({
      label:`${RUNS.labels[r]}${m.label}`, metric:m.key, run:r, kind:"run"
    }));
  }
  const fieldsPerRun = METRICS.length;
  const fixedCount = HORSE_FIELDS.length;
  return { csvCols, fieldsPerRun, fixedCount };
})();
</script>

<!-- ════════ CORE — モジュール間バス ════════ -->
<script>
const Core = (() => {
  const L = {};
  const on  = (e,f) => { (L[e]=L[e]||[]).push(f); };
  const emit= (e,d) => { (L[e]||[]).forEach(f=>f(d)); };
  const register = (k,fn) => { const m=APP_CONFIG.modules[k]; if(m&&m.enabled) fn(); };
  return { on, emit, register };
})();

Core.on("ui:tab", ({name}) => {
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const panel=document.getElementById("panel-"+name);
  const btn=document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if(panel) panel.classList.add("active");
  if(btn) btn.classList.add("active");
});

Core.on("ui:notify", ({msg,type}) => {
  const el=document.createElement("div");
  el.className=`toast ${type||"ok"}`; el.textContent=msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>el.remove(),3000);
});

function buildNav(){
  const nav=document.getElementById("main-nav");
  Object.entries(APP_CONFIG.modules).forEach(([k,m])=>{
    if(!m.enabled||m.tab===false) return;
    const b=document.createElement("button");
    b.className="tab-btn"; b.dataset.tab=k; b.textContent=m.label;
    b.addEventListener("click",()=>Core.emit("ui:tab",{name:k}));
    nav.appendChild(b);
  });
  document.getElementById("app-version").textContent=`v${APP_CONFIG.app.version}`;
}
function esc(s){ if(s==null)return"";
  return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
</script>

<!-- ════════ MOD_INPUT ════════ -->
<script>
const ModInput = (() => {
  function init(){
    _hint();
    document.getElementById("btn-parse").addEventListener("click",_parse);
    document.getElementById("btn-clear").addEventListener("click",_clear);
    document.getElementById("btn-sample").addEventListener("click",_sample);
    document.getElementById("raw-input").addEventListener("input",e=>_count(e.target.value));
    Core.on("history:loaded",({entry})=>{
      document.getElementById("raw-input").value=entry.raw_text||"";
      document.getElementById("input-race-name").value=entry.race_name||"";
      document.getElementById("input-race-date").value=entry.race_date||"";
      _count(entry.raw_text||"");
    });
  }
  function _hint(){
    document.getElementById("format-hint").innerHTML=
      `<span class="hint-label">列順：</span>`+
      SCHEMA.csvCols.map((c,i)=>`<span class="hint-col">${i+1}.${c.label}</span>`).join("");
    document.getElementById("raw-input").placeholder=
      "# "+SCHEMA.csvCols.map(c=>c.label).join(",")+"\n1行1頭、カンマ区切りで入力";
  }
  function _count(t){
    const n=t.trim().split("\n").filter(l=>l.trim()&&!l.startsWith("#")).length;
    document.getElementById("line-count").textContent=n+"頭分";
  }
  function _parse(){
    const text=document.getElementById("raw-input").value.trim();
    if(!text){ Core.emit("ui:notify",{msg:"テキストを入力してください",type:"warn"}); return; }
    try{
      const horses=_toHorses(text);
      if(!horses.length) throw new Error("馬データを検出できませんでした");
      Core.emit("input:parsed",{horses,raw_text:text});
      Core.emit("ui:notify",{msg:horses.length+"頭を解析しました",type:"ok"});
      Core.emit("ui:tab",{name:"output"});
    }catch(e){ Core.emit("ui:notify",{msg:e.message,type:"error"}); }
  }
  function _toHorses(text){
    const horses=[];
    text.split("\n").forEach(line=>{
      line=line.trim();
      if(!line||line.startsWith("#")) return;
      const cols=line.split(",").map(c=>c.trim());
      if(cols.length<SCHEMA.fixedCount) return;
      const horse={};
      HORSE_FIELDS.forEach((f,i)=>horse[f.key]=cols[i]||null);
      horse.runs=[];
      for(let r=0;r<RUNS.count;r++){
        const base=SCHEMA.fixedCount+r*SCHEMA.fieldsPerRun;
        const run={};
        METRICS.forEach((m,mi)=>run[m.key]=cols[base+mi]||null);
        horse.runs.push(run);
      }
      horses.push(horse);
    });
    return horses;
  }
  function _clear(){
    document.getElementById("raw-input").value="";
    document.getElementById("line-count").textContent="0頭分";
  }
  function _sample(){
    const lines=[
      "# "+SCHEMA.csvCols.map(c=>c.label).join(","),
      "1,ライヒスアドラー,佐々木,皐月賞,3,弥生賞,2,東スポ杯,3,新馬,1",
      "2,マテンロウゲイル,横山和,皐月賞,10,弥生賞,2,未勝利,1,無,無",
      "3,シュバルツクーゲル,武豊,ホープフルS,2,共同通信杯,1,東スポ杯,2,新馬,1",
      "4,アルレッキーノ,川田,弥生賞,1,共同通信杯,3,東スポ杯,5,未勝利,1",
      "5,トロヴァトーレ,Cデムーロ,スプリングS,2,きさらぎ賞,1,1勝クラス,1,新馬,2",
    ];
    document.getElementById("raw-input").value=lines.join("\n");
    document.getElementById("input-race-name").value="日本ダービー";
    document.getElementById("input-race-date").value=new Date().toISOString().slice(0,10);
    _count(lines.join("\n"));
    Core.emit("ui:notify",{msg:"サンプルをロードしました",type:"ok"});
  }
  return { init };
})();
</script>

<!-- ════════ MOD_PROCESS ════════ -->
<script>
const ModProcess = (() => {
  function init(){
    Core.on("input:parsed",({horses,raw_text})=>{
      const results=_scoreAll(horses);
      Core.emit("process:scored",{results,raw_text});
    });
    Core.on("history:loaded",({entry})=>{
      if(entry.results)
        Core.emit("process:scored",{results:entry.results,raw_text:entry.raw_text,fromHistory:true});
    });
  }

  // 指標1つ分のスコア（0..1 or null）
  function _metricScore(metric,rawVal){
    if(rawVal==null||metric.none.includes(String(rawVal).trim())) return null;
    const v=String(rawVal).trim();
    if(metric.type==="map"){
      if(v in metric.scoreMap) return metric.scoreMap[v];
      return metric.fallback ? metric.fallback(v) : null;
    }
    if(metric.type==="linear"){
      const num=metric.parse ? metric.parse(v) : parseFloat(v);
      if(num==null||isNaN(num)) return null;
      let t=(num-metric.min)/(metric.max-metric.min);
      t=Math.max(0,Math.min(1,t));
      return metric.invert ? 1-t : t;
    }
    return null;
  }

  // 1走分：指標を重み付け合成 → その走のスコア
  function _runScore(run){
    let sum=0, wsum=0; const detail={};
    METRICS.forEach(m=>{
      const s=_metricScore(m,run[m.key]);
      detail[m.key]={ raw:run[m.key], score:s };
      if(s!=null){ sum+=s*m.weight; wsum+=m.weight; }
    });
    const score = wsum>0 ? sum/wsum : null;
    return { score: score==null?null:Math.round(score*1000)/1000, detail };
  }

  function _scoreAll(horses){
    const scored=horses.map(h=>{
      const run_scores=h.runs.map(r=>_runScore(r));
      let total=0, tw=0;
      run_scores.forEach((rs,i)=>{
        if(rs.score==null) return;
        const w=RUNS.weights[i]||0; total+=rs.score*w; tw+=w;
      });
      const score = tw>0 ? Math.round(total/tw*10000)/10000 : null;
      return { ...h, run_scores, score, rank:null };
    });
    const valid=scored.filter(h=>h.score!=null).sort((a,b)=>b.score-a.score);
    const inv=scored.filter(h=>h.score==null);
    valid.forEach((h,i)=>h.rank=i+1);
    inv.forEach((h,i)=>h.rank=valid.length+i+1);
    return [...valid,...inv];
  }

  function getCoeffSnap(){
    return {
      metrics: METRICS.map(m=>({ key:m.key, label:m.label, type:m.type, weight:m.weight,
        scoreMap:m.scoreMap||null, min:m.min??null, max:m.max??null })),
      runWeights:[...RUNS.weights],
    };
  }
  return { init, getCoeffSnap };
})();
</script>

<!-- ════════ MOD_OUTPUT ════════ -->
<script>
const ModOutput = (() => {
  let _res=null, _raw="";

  function init(){
    Core.on("process:scored",({results,raw_text,fromHistory})=>{
      _res=results; _raw=raw_text||"";
      _render(results);
      document.getElementById("save-bar").style.display=fromHistory?"none":"flex";
    });
    document.getElementById("btn-save-history").addEventListener("click",_save);
    document.getElementById("btn-copy-result").addEventListener("click",_copy);
  }

  // 出力列を自動生成：固定列 + 各走列(METRICS×showRunsInOutput) + コメント
  function _columns(){
    const cols=[];
    if(APP_CONFIG.outputFixed.rank)  cols.push({key:"rank",label:"順位"});
    HORSE_FIELDS.filter(f=>f.showInOutput).forEach(f=>cols.push({key:f.key,label:f.label}));
    if(APP_CONFIG.outputFixed.score) cols.push({key:"score",label:"相手指標"});
    // 各走×各指標
    for(let r=0;r<RUNS.count;r++){
      METRICS.forEach(m=>{
        if(!m.showRunsInOutput.includes(r+1)) return;
        cols.push({ runCol:true, run:r, metric:m, label:`${RUNS.labels[r]}${m.label}` });
      });
    }
    if(APP_CONFIG.outputFixed.comment) cols.push({key:"comment",label:"コメント"});
    return cols;
  }

  function _render(results){
    const cols=_columns();
    const thead=cols.map(c=>`<th>${esc(c.label)}</th>`).join("");
    const tbody=results.map(h=>
      `<tr class="${h.rank===1?'rank-1':h.rank<=3?'rank-top':''}">`+
      cols.map(c=>`<td>${_cell(h,c)}</td>`).join("")+"</tr>"
    ).join("");
    document.getElementById("result-table").innerHTML=
      `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
    document.getElementById("result-summary").innerHTML=
      `<span class="badge">${results.length}頭</span>`+
      (results[0]?`<span class="badge accent">◎ ${esc(results[0].horse_name)}</span>`:"");
  }

  function _cell(h,c){
    if(c.runCol){
      const rs=h.run_scores&&h.run_scores[c.run];
      const d=rs&&rs.detail[c.metric.key];
      if(!d||d.raw==null||c.metric.none.includes(String(d.raw).trim()))
        return `<span class="muted">-</span>`;
      const sc=d.score!=null?d.score.toFixed(3):"-";
      return `<span class="run-cell">${esc(d.raw)}<br><small>${sc}</small></span>`;
    }
    switch(c.key){
      case "rank":  return `<b>${h.rank??"-"}</b>`;
      case "score": return h.score!=null?`<span class="score">${h.score.toFixed(4)}</span>`:`<span class="muted">-</span>`;
      case "comment": return _comment(h);
      default: return esc(h[c.key]);
    }
  }

  function _comment(h){
    const valid=h.run_scores.filter(r=>r.score!=null);
    if(!valid.length) return `<span class="muted">データ不足</span>`;
    const ss=valid.map(r=>r.score);
    const spread=Math.max(...ss)-Math.min(...ss);
    const tags=[];
    if(h.rank===1) tags.push("◎ 最高指標");
    else if(h.rank<=3) tags.push("○ 上位");
    if(spread<0.02) tags.push("安定型");
    else if(spread>0.08) tags.push("ムラあり");
    const r0=h.run_scores[0];
    if(r0&&r0.detail.grade&&r0.detail.grade.score>=0.99) tags.push("前走G1級");
    if(r0&&r0.detail.finish&&r0.detail.finish.score===1.0) tags.push("前走1着");
    return `<span class="comment-text">${tags.join(" / ")||"—"}</span>`;
  }

  function _save(){
    Core.emit("history:save",{
      race_name:document.getElementById("input-race-name").value,
      race_date:document.getElementById("input-race-date").value,
      raw_text:_raw, parsed:_res,
      coeff_snap:ModProcess.getCoeffSnap(), results:_res,
      ranking:_res.map(h=>({rank:h.rank,horse_name:h.horse_name,score:h.score})),
      memo:document.getElementById("save-memo").value,
    });
    document.getElementById("save-bar").style.display="none";
    document.getElementById("save-memo").value="";
  }
  function _copy(){
    if(!_res) return;
    const t=_res.map(h=>`${h.rank}位 ${h.horse_name} (${h.score!=null?h.score.toFixed(4):"-"})`).join("\n");
    navigator.clipboard.writeText(t);
    Core.emit("ui:notify",{msg:"コピーしました",type:"ok"});
  }
  return { init };
})();
</script>

<!-- ════════ MOD_HISTORY ════════ -->
<script>
const ModHistory = (() => {
  const KEY="keiba_analyzer_v2";
  let _data=[];
  function init(){
    try{ _data=JSON.parse(localStorage.getItem(KEY)||"[]"); }catch{ _data=[]; }
    Core.on("history:save",entry=>{
      const id=crypto.randomUUID?crypto.randomUUID():String(Date.now());
      _data.unshift({id,saved_at:new Date().toISOString(),...entry});
      _persist(); _list();
      Core.emit("ui:notify",{msg:"履歴に保存しました",type:"ok"});
    });
    document.getElementById("btn-export-history").addEventListener("click",()=>{
      const blob=new Blob([JSON.stringify(_data,null,2)],{type:"application/json"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
      a.download=`keiba-history-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(a.href);
    });
    document.getElementById("btn-import-history").addEventListener("click",()=>
      document.getElementById("import-file").click());
    document.getElementById("import-file").addEventListener("change",e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{ try{
        const imp=JSON.parse(r.result); if(!Array.isArray(imp)) throw 0;
        _data=[...imp,..._data]; _persist(); _list();
        Core.emit("ui:notify",{msg:imp.length+"件インポートしました",type:"ok"});
      }catch{ Core.emit("ui:notify",{msg:"インポート失敗",type:"error"}); } };
      r.readAsText(f); e.target.value="";
    });
    document.getElementById("btn-clear-history").addEventListener("click",()=>{
      if(!confirm("全履歴を削除しますか？")) return;
      _data=[]; _persist(); _list();
    });
    _list();
  }
  function _list(){
    const el=document.getElementById("history-list");
    if(!_data.length){ el.innerHTML=`<p class="muted center">保存履歴なし</p>`;
      document.getElementById("history-detail").innerHTML=""; return; }
    el.innerHTML=_data.map(e=>`
      <div class="history-item">
        <div class="history-item-header">
          <span class="history-race">${esc(e.race_name||"（未入力）")}</span>
          <span class="history-date">${e.race_date||e.saved_at?.slice(0,10)||""}</span>
        </div>
        <div class="history-meta">
          ${(e.ranking||[]).slice(0,3).map(r=>`<span class="rank-chip">${r.rank}位 ${esc(r.horse_name)}</span>`).join("")}
        </div>
        <div class="history-actions">
          <button class="btn-sm" onclick="ModHistory.load('${e.id}')">読込</button>
          <button class="btn-sm danger" onclick="ModHistory.del('${e.id}')">削除</button>
        </div>
      </div>`).join("");
  }
  function load(id){
    const e=_data.find(x=>x.id===id); if(!e) return;
    document.getElementById("history-detail").innerHTML=`
      <div class="detail-block">
        <h3>${esc(e.race_name||"—")} <small>${e.race_date||""}</small></h3>
        <div class="detail-section"><b>最終順位</b>
          <table><thead><tr><th>順位</th><th>馬名</th><th>指標</th></tr></thead><tbody>
          ${(e.ranking||[]).map(r=>`<tr><td>${r.rank}</td><td>${esc(r.horse_name)}</td><td>${r.score!=null?r.score.toFixed(4):"-"}</td></tr>`).join("")}
          </tbody></table></div>
        ${e.memo?`<div class="detail-section"><b>メモ・反省</b><p>${esc(e.memo)}</p></div>`:""}
        <div class="detail-section"><b>使用係数スナップショット</b>
          <pre class="coeff-snap">${esc(JSON.stringify(e.coeff_snap,null,2))}</pre></div>
        <div class="detail-section"><b>入力テキスト</b>
          <pre class="raw-text">${esc(e.raw_text||"")}</pre></div>
      </div>`;
    Core.emit("history:loaded",{entry:e});
    Core.emit("ui:tab",{name:"input"});
    Core.emit("ui:notify",{msg:`「${e.race_name||"—"}」を読み込みました`,type:"ok"});
  }
  function del(id){
    if(!confirm("削除しますか？")) return;
    _data=_data.filter(x=>x.id!==id); _persist(); _list();
  }
  function _persist(){ localStorage.setItem(KEY,JSON.stringify(_data)); }
  return { init, load, del };
})();
</script>

<!-- ════════ 起動 ════════ -->
<script>
function initSettings(){
  document.getElementById("settings-metrics").innerHTML=METRICS.map(m=>`
    <div style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;color:var(--accent)">${esc(m.label)} <span class="muted">(${m.key} / ${m.type} / 重み${m.weight})</span></div>
      <pre style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-family:var(--font-mono);font-size:11px;overflow:auto;max-height:200px;color:var(--muted);white-space:pre;margin-top:6px">${esc(
        m.type==="map" ? JSON.stringify(m.scoreMap,null,2)
        : `min:${m.min} max:${m.max} invert:${!!m.invert}`
      )}</pre>
    </div>`).join("");
  document.getElementById("view-schema").textContent=
    "CSV列順:\n"+SCHEMA.csvCols.map((c,i)=>`  ${i+1}. ${c.label}`).join("\n")+
    `\n\n走数: ${RUNS.count}\n走の重み: ${RUNS.weights.slice(0,RUNS.count).join(", ")}`;
}

buildNav();
Core.register("input",   ()=>ModInput.init());
Core.register("process", ()=>ModProcess.init());
Core.register("output",  ()=>ModOutput.init());
Core.register("history", ()=>ModHistory.init());
Core.register("settings",()=>initSettings());
Core.on("ui:tab",({name})=>{ if(name==="settings") initSettings(); });
Core.emit("ui:tab",{name:"input"});
</script>
