<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相手指標アナライザー</title>
<style>
/* ── リセット・変数 ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0f14;
  --bg2:      #151820;
  --bg3:      #1c2030;
  --border:   #2a2f42;
  --accent:   #e8b84b;
  --accent2:  #4b8fe8;
  --text:     #dde2f0;
  --muted:    #6b7494;
  --ok:       #4bca81;
  --warn:     #e8b84b;
  --danger:   #e8504b;
  --rank1:    rgba(232,184,75,0.12);
  --ranktop:  rgba(75,143,232,0.08);
  --font-mono: 'Courier New', monospace;
  --radius:   6px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── ヘッダー ─────────────────────────────────────── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.app-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--accent);
}
.app-version { font-size: 11px; color: var(--muted); }

/* ── タブナビ ─────────────────────────────────────── */
nav {
  display: flex;
  gap: 2px;
  margin-left: auto;
}
.tab-btn {
  background: none;
  border: none;
  color: var(--muted);
  padding: 6px 16px;
  cursor: pointer;
  font-size: 13px;
  border-radius: var(--radius);
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: var(--bg3); }
.tab-btn.active { color: var(--accent); background: var(--bg3); font-weight: 600; }

/* ── メインレイアウト ─────────────────────────────── */
main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── カード ───────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

/* ── フォームパーツ ───────────────────────────────── */
.row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
input[type="text"], input[type="date"], textarea, select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  width: 100%;
  transition: border-color 0.15s;
  font-family: inherit;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent2);
}
textarea {
  resize: vertical;
  min-height: 200px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.8;
}

/* ── ボタン ───────────────────────────────────────── */
.btn {
  padding: 8px 18px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #0d0f14; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent2); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: rgba(232,80,75,0.1); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; }
.btn-sm:hover { border-color: var(--accent2); }
.btn-sm.danger { color: var(--danger); border-color: var(--danger); }
.btn-sm.danger:hover { background: rgba(232,80,75,0.1); }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ── ヒント ───────────────────────────────────────── */
.format-hint {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 11px;
  margin-bottom: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.hint-label { color: var(--muted); }
.hint-col {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent2);
}

/* ── テーブル ─────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--bg3);
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr.rank-1  { background: var(--rank1); }
tr.rank-top { background: var(--ranktop); }
tr:hover td { background: rgba(255,255,255,0.02); }

.score { font-family: var(--font-mono); font-weight: 700; color: var(--accent); font-size: 14px; }
.run-score { font-size: 12px; line-height: 1.5; }
.run-score small { color: var(--muted); font-family: var(--font-mono); }
.comment-text { font-size: 11px; color: var(--muted); }

/* ── バッジ ───────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
}
.badge.accent { background: rgba(232,184,75,0.15); border-color: var(--accent); color: var(--accent); }

/* ── サマリ ───────────────────────────────────────── */
#result-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

/* ── 保存バー ─────────────────────────────────────── */
#save-bar {
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(232,184,75,0.08);
  border: 1px solid rgba(232,184,75,0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
#save-bar label { color: var(--muted); font-size: 11px; white-space: nowrap; }
#save-memo { flex: 1; min-width: 200px; }

/* ── 履歴 ─────────────────────────────────────────── */
.history-grid { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
@media (max-width: 700px) { .history-grid { grid-template-columns: 1fr; } }

.history-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.history-item:hover { border-color: var(--accent2); }
.history-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-race { font-weight: 600; font-size: 13px; }
.history-date { font-size: 11px; color: var(--muted); }
.history-meta { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.rank-chip {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
}
.history-actions { display: flex; gap: 6px; }

.detail-block { }
.detail-block h3 { font-size: 15px; margin-bottom: 14px; }
.detail-block h3 small { color: var(--muted); font-size: 12px; margin-left: 8px; }
.detail-section { margin-bottom: 16px; }
.detail-section b { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.detail-section p { font-size: 13px; line-height: 1.7; }
.coeff-snap, .raw-text {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  overflow-x: auto;
  max-height: 200px;
  white-space: pre;
  color: var(--muted);
}

/* ── 設定タブ ─────────────────────────────────────── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .settings-grid { grid-template-columns: 1fr; } }
.settings-grid pre {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  overflow: auto;
  max-height: 320px;
  color: var(--muted);
  white-space: pre;
}

/* ── 行数カウント ─────────────────────────────────── */
.textarea-meta {
  display: flex;
  justify-content: flex-end;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── トースト通知 ─────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  animation: slideIn 0.2s ease;
  max-width: 280px;
}
.toast.ok    { background: rgba(75,202,129,0.15); border: 1px solid var(--ok); color: var(--ok); }
.toast.warn  { background: rgba(232,184,75,0.15); border: 1px solid var(--warn); color: var(--warn); }
.toast.error { background: rgba(232,80,75,0.15); border: 1px solid var(--danger); color: var(--danger); }
@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

/* ── ユーティリティ ──────────────────────────────── */
.muted { color: var(--muted); }
.center { text-align: center; padding: 24px; }
</style>
</head>
<body>

<header>
  <span class="app-title">相手指標アナライザー</span>
  <span class="app-version" id="app-version"></span>
  <nav id="main-nav"></nav>
</header>

<main>
  <!-- ── 入力タブ ───────────────────────────────────── -->
  <div class="tab-panel" id="panel-input">
    <div class="card">
      <div class="card-title">レース情報</div>
      <div class="row">
        <div class="field">
          <label>レース名</label>
          <input type="text" id="input-race-name" placeholder="例：日本ダービー">
        </div>
        <div class="field" style="max-width:160px">
          <label>日付</label>
          <input type="date" id="input-race-date">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">出走馬データ入力</div>
      <div class="format-hint" id="format-hint"></div>
      <textarea id="raw-input" placeholder="# でコメント行。1行1頭、カンマ区切りで入力
例）
1,ライヒスアドラー,佐々木,皐月賞,3,弥生賞,2,東スポ杯,3,新馬,1
2,マテンロウゲイル,横山和,皐月賞,10,弥生賞,2,未勝利,1,無,無"></textarea>
      <div class="textarea-meta"><span id="line-count">0頭分</span></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-primary" id="btn-parse">解析する</button>
        <button class="btn btn-secondary" id="btn-sample">サンプル</button>
        <button class="btn btn-secondary" id="btn-clear">クリア</button>
      </div>
    </div>
  </div>

  <!-- ── 予想タブ ───────────────────────────────────── -->
  <div class="tab-panel" id="panel-output">
    <div id="save-bar">
      <label>メモ・反省：</label>
      <input type="text" id="save-memo" placeholder="任意メモ">
      <button class="btn btn-primary" id="btn-save-history">履歴に保存</button>
      <button class="btn btn-secondary" id="btn-copy-result">結果コピー</button>
    </div>
    <div id="result-summary"></div>
    <div class="card">
      <div class="card-title">予想結果</div>
      <div class="table-wrap" id="result-table">
        <p class="muted center">入力タブでデータを解析してください</p>
      </div>
    </div>
  </div>

  <!-- ── 履歴タブ ───────────────────────────────────── -->
  <div class="tab-panel" id="panel-history">
    <div class="card">
      <div class="card-title">操作</div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-export-history">エクスポート</button>
        <button class="btn btn-secondary" id="btn-import-history">インポート</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button class="btn btn-danger" id="btn-clear-history">全削除</button>
      </div>
    </div>
    <div class="history-grid">
      <div id="history-list"></div>
      <div id="history-detail"><p class="muted center">左の履歴を選択してください</p></div>
    </div>
  </div>

  <!-- ── 設定タブ ───────────────────────────────────── -->
  <div class="tab-panel" id="panel-settings">
    <div class="card">
      <div class="card-title">現在の係数マスタ（config.js を編集で変更）</div>
      <div class="settings-grid">
        <div>
          <div class="card-title">格スコア</div>
          <pre id="view-grade"></pre>
        </div>
        <div>
          <div class="card-title">着順スコア</div>
          <pre id="view-finish"></pre>
        </div>
        <div>
          <div class="card-title">走数重み</div>
          <pre id="view-weights"></pre>
        </div>
        <div>
          <div class="card-title">入力スキーマ</div>
          <pre id="view-schema"></pre>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════
     CORE.js — モジュール間バス
════════════════════════════════════════════════ -->
<script>
const Core = (() => {
  const _listeners = {};
  function on(event, fn) {
    if (!_listeners[event]) _listeners[event] = [];
    _listeners[event].push(fn);
  }
  function emit(event, data) {
    (_listeners[event] || []).forEach(fn => fn(data));
  }
  function register(moduleKey, initFn) {
    const mod = APP_CONFIG.modules[moduleKey];
    if (!mod || !mod.enabled) return;
    initFn();
  }
  return { on, emit, register };
})();

// UI共通：タブ切替
Core.on("ui:tab", ({ name }) => {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  const panel = document.getElementById("panel-" + name);
  const btn   = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (panel) panel.classList.add("active");
  if (btn)   btn.classList.add("active");
});

// UI共通：トースト通知
Core.on("ui:notify", ({ msg, type }) => {
  const el = document.createElement("div");
  el.className = `toast ${type || "ok"}`;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.remove(), 3000);
});

// ナビ生成
function buildNav() {
  const nav = document.getElementById("main-nav");
  Object.entries(APP_CONFIG.modules).forEach(([key, mod]) => {
    if (!mod.enabled || mod.tab === false) return;
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.dataset.tab = key;
    btn.textContent = mod.label;
    btn.addEventListener("click", () => Core.emit("ui:tab", { name: btn.dataset.tab }));
    nav.appendChild(btn);
  });
  document.getElementById("app-version").textContent = `v${APP_CONFIG.app.version}`;
}
</script>

<!-- ════════════════════════════════════════════════
     MOD_INPUT.js — インプットモジュール
════════════════════════════════════════════════ -->
<script>
const ModInput = (() => {
  function init() {
    _buildFormatHint();
    document.getElementById("btn-parse").addEventListener("click", _onParse);
    document.getElementById("btn-clear").addEventListener("click", _onClear);
    document.getElementById("btn-sample").addEventListener("click", _onSample);
    document.getElementById("raw-input").addEventListener("input", e => _updateCount(e.target.value));

    Core.on("history:loaded", ({ entry }) => {
      document.getElementById("raw-input").value = entry.raw_text || "";
      document.getElementById("input-race-name").value = entry.race_name || "";
      document.getElementById("input-race-date").value = entry.race_date || "";
      _updateCount(entry.raw_text || "");
    });
  }

  function _buildFormatHint() {
    const cfg = APP_CONFIG;
    const cols = cfg.horseFields.map(f => f.label);
    cfg.runs.labels.forEach(rl => {
      cfg.runs.fields.forEach(rf => cols.push(rl + rf.label));
    });
    document.getElementById("format-hint").innerHTML =
      `<span class="hint-label">列順：</span>` +
      cols.map((c, i) => `<span class="hint-col">${i+1}.${c}</span>`).join("");
  }

  function _updateCount(text) {
    const n = text.trim().split("\n").filter(l => l.trim() && !l.startsWith("#")).length;
    document.getElementById("line-count").textContent = n + "頭分";
  }

  function _onParse() {
    const text = document.getElementById("raw-input").value.trim();
    if (!text) { Core.emit("ui:notify", { msg: "テキストを入力してください", type: "warn" }); return; }
    try {
      const horses = _parse(text);
      if (!horses.length) throw new Error("馬データを検出できませんでした");
      Core.emit("input:parsed", { horses, raw_text: text });
      Core.emit("ui:notify", { msg: horses.length + "頭を解析しました", type: "ok" });
      Core.emit("ui:tab", { name: "output" });
    } catch(e) {
      Core.emit("ui:notify", { msg: e.message, type: "error" });
    }
  }

  function _parse(text) {
    const cfg = APP_CONFIG;
    const rc = cfg.runs.count;
    const rf = cfg.runs.fields.length;
    const fc = cfg.horseFields.length;
    const horses = [];
    text.split("\n").forEach(line => {
      line = line.trim();
      if (!line || line.startsWith("#")) return;
      const cols = line.split(",").map(c => c.trim());
      if (cols.length < fc) return;
      const horse = {};
      cfg.horseFields.forEach((f, i) => { horse[f.key] = cols[i] || null; });
      horse.runs = [];
      for (let r = 0; r < rc; r++) {
        const base = fc + r * rf;
        const run = {};
        cfg.runs.fields.forEach((f, fi) => { run[f.key] = cols[base + fi] || null; });
        horse.runs.push(run);
      }
      horses.push(horse);
    });
    return horses;
  }

  function _onClear() {
    document.getElementById("raw-input").value = "";
    document.getElementById("line-count").textContent = "0頭分";
  }

  function _onSample() {
    const lines = [
      "# 馬番,馬名,騎手,前走格,前走着順,2走前格,2走前着順,3走前格,3走前着順,4走前格,4走前着順",
      "1,ライヒスアドラー,佐々木,皐月賞,3,弥生賞,2,東スポ杯,3,新馬,1",
      "2,マテンロウゲイル,横山和,皐月賞,10,弥生賞,2,未勝利,1,無,無",
      "3,シュバルツクーゲル,武豊,ホープフルS,2,共同通信杯,1,東スポ杯,2,新馬,1",
      "4,アルレッキーノ,川田,弥生賞,1,共同通信杯,3,東スポ杯,5,未勝利,1",
      "5,トロヴァトーレ,Cデムーロ,スプリングS,2,きさらぎ賞,1,1勝クラス,1,新馬,2",
    ];
    document.getElementById("raw-input").value = lines.join("\n");
    document.getElementById("input-race-name").value = "日本ダービー";
    document.getElementById("input-race-date").value = new Date().toISOString().slice(0,10);
    _updateCount(lines.join("\n"));
    Core.emit("ui:notify", { msg: "サンプルをロードしました", type: "ok" });
  }

  return { init };
})();
</script>

<!-- ════════════════════════════════════════════════
     MOD_PROCESS.js — データ処理モジュール
════════════════════════════════════════════════ -->
<script>
const ModProcess = (() => {
  function init() {
    Core.on("input:parsed", ({ horses, raw_text }) => {
      const results = _scoreAll(horses);
      Core.emit("process:scored", { results, raw_text });
    });
    Core.on("history:loaded", ({ entry }) => {
      if (entry.results) {
        Core.emit("process:scored", { results: entry.results, raw_text: entry.raw_text, fromHistory: true });
      }
    });
  }

  function _scoreAll(horses) {
    const weights = APP_CONFIG.scoring.runWeights;
    const scored = horses.map(horse => {
      const run_scores = horse.runs.map(run => _scoreRun(run));
      const score = _calcTotal(run_scores, weights);
      return { ...horse, run_scores, score, rank: null };
    });
    const valid   = scored.filter(h => h.score !== null).sort((a,b) => b.score - a.score);
    const invalid = scored.filter(h => h.score === null);
    valid.forEach((h,i) => h.rank = i+1);
    invalid.forEach((h,i) => h.rank = valid.length + i + 1);
    return [...valid, ...invalid];
  }

  function _scoreRun(run) {
    const gs = _gradeScore(run.grade);
    const fs = _finishScore(run.finish);
    if (gs === null || fs === null) return { grade: run.grade, finish: run.finish, gs: null, fs: null, score: null };
    return {
      grade: run.grade, finish: run.finish, gs, fs,
      score: Math.round(gs * fs * 1000) / 1000,
      label: run.grade + " " + run.finish + "着",
    };
  }

  function _calcTotal(run_scores, weights) {
    let total = 0, tw = 0;
    run_scores.forEach((rs, i) => {
      if (rs.score === null) return;
      const w = weights[i] || 0;
      total += rs.score * w;
      tw += w;
    });
    if (tw === 0) return null;
    return Math.round(total / tw * 10000) / 10000;
  }

  function _gradeScore(grade) {
    if (!grade || grade === "無") return null;
    const map = APP_CONFIG.gradeScore;
    if (grade in map) return map[grade];
    if (/G3|GIII/.test(grade)) return map["その他G3"] ?? null;
    if (/G2|GII/.test(grade))  return 0.970;
    if (/G1|GI/.test(grade))   return 1.000;
    if (/L|OP|オープン/.test(grade))    return map["L/OP"] ?? null;
    if (/1勝/.test(grade))     return map["1勝クラス"] ?? null;
    if (/未勝利|新馬/.test(grade)) return map["新馬・未勝利"] ?? null;
    return null;
  }

  function _finishScore(finish) {
    if (!finish || finish === "無") return null;
    const map = APP_CONFIG.finishScore;
    const key = String(finish).trim();
    if (key in map) return map[key];
    const n = parseInt(key, 10);
    if (!isNaN(n) && n >= 6) return map["_default"];
    return null;
  }

  function getCoeffSnap() {
    return {
      gradeScore:  { ...APP_CONFIG.gradeScore },
      finishScore: { ...APP_CONFIG.finishScore },
      runWeights:  [...APP_CONFIG.scoring.runWeights],
    };
  }

  return { init, getCoeffSnap };
})();
</script>

<!-- ════════════════════════════════════════════════
     MOD_OUTPUT.js — 予想出力モジュール
════════════════════════════════════════════════ -->
<script>
const ModOutput = (() => {
  let _lastResults = null, _lastRaw = "";

  function init() {
    Core.on("process:scored", ({ results, raw_text, fromHistory }) => {
      _lastResults = results;
      _lastRaw = raw_text || "";
      _render(results);
      document.getElementById("save-bar").style.display = fromHistory ? "none" : "flex";
    });
    document.getElementById("btn-save-history").addEventListener("click", _onSave);
    document.getElementById("btn-copy-result").addEventListener("click", _onCopy);
  }

  function _render(results) {
    const cols = APP_CONFIG.outputColumns.filter(c => c.visible);
    const thead = cols.map(c => `<th>${c.label}</th>`).join("");
    const tbody = results.map(h =>
      `<tr class="${h.rank===1?'rank-1':h.rank<=3?'rank-top':''}">` +
      cols.map(c => `<td>${_cell(h, c)}</td>`).join("") + "</tr>"
    ).join("");
    document.getElementById("result-table").innerHTML =
      `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
    document.getElementById("result-summary").innerHTML =
      `<span class="badge">${results.length}頭</span>` +
      (results[0] ? `<span class="badge accent">◎ ${esc(results[0].horse_name)}</span>` : "");
  }

  function _cell(h, col) {
    switch(col.key) {
      case "rank":       return `<b>${h.rank ?? "-"}</b>`;
      case "horse_no":   return esc(h.horse_no);
      case "horse_name": return `<b>${esc(h.horse_name)}</b>`;
      case "jockey":     return esc(h.jockey);
      case "score":      return h.score !== null
        ? `<span class="score">${h.score.toFixed(4)}</span>` : `<span class="muted">-</span>`;
      case "comment":    return _comment(h);
      default:
        const m = col.key.match(/^run(\d+)$/);
        if (m) {
          const rs = h.run_scores && h.run_scores[+m[1]-1];
          if (!rs || rs.score === null) return `<span class="muted">-</span>`;
          return `<span class="run-score">${esc(rs.label)}<br><small>${rs.score.toFixed(3)}</small></span>`;
        }
        return "";
    }
  }

  function _comment(h) {
    if (!h.run_scores) return "";
    const valid = h.run_scores.filter(r => r.score !== null);
    if (!valid.length) return `<span class="muted">データ不足</span>`;
    const scores = valid.map(r => r.score);
    const spread = Math.max(...scores) - Math.min(...scores);
    const tags = [];
    if (h.rank === 1)         tags.push("◎ 最高指標");
    else if (h.rank <= 3)     tags.push("○ 上位");
    if (spread < 0.02)        tags.push("安定型");
    else if (spread > 0.08)   tags.push("ムラあり");
    const r0 = h.run_scores[0];
    if (r0?.gs >= 0.99)       tags.push("前走G1級");
    if (r0?.fs === 1.0)       tags.push("前走1着");
    return `<span class="comment-text">${tags.join(" / ") || "—"}</span>`;
  }

  function _onSave() {
    Core.emit("history:save", {
      race_name:  document.getElementById("input-race-name").value,
      race_date:  document.getElementById("input-race-date").value,
      raw_text:   _lastRaw,
      parsed:     _lastResults,
      coeff_snap: ModProcess.getCoeffSnap(),
      results:    _lastResults,
      ranking:    _lastResults.map(h => ({ rank: h.rank, horse_name: h.horse_name, score: h.score })),
      memo:       document.getElementById("save-memo").value,
    });
    document.getElementById("save-bar").style.display = "none";
    document.getElementById("save-memo").value = "";
  }

  function _onCopy() {
    if (!_lastResults) return;
    const text = _lastResults.map(h =>
      `${h.rank}位 ${h.horse_name} (${h.score !== null ? h.score.toFixed(4) : "-"})`
    ).join("\n");
    navigator.clipboard.writeText(text);
    Core.emit("ui:notify", { msg: "コピーしました", type: "ok" });
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  }

  return { init };
})();
</script>

<!-- ════════════════════════════════════════════════
     MOD_HISTORY.js — 履歴保存モジュール
════════════════════════════════════════════════ -->
<script>
const ModHistory = (() => {
  const KEY = "keiba_analyzer_v1";
  let _data = [];

  function init() {
    try { _data = JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { _data = []; }

    Core.on("history:save", entry => {
      const id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      _data.unshift({ id, saved_at: new Date().toISOString(), ...entry });
      _persist(); _renderList();
      Core.emit("history:saved", { entry: _data[0] });
      Core.emit("ui:notify", { msg: "履歴に保存しました", type: "ok" });
    });

    document.getElementById("btn-export-history").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(_data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `keiba-history-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(a.href);
    });
    document.getElementById("btn-import-history").addEventListener("click", () =>
      document.getElementById("import-file").click());
    document.getElementById("import-file").addEventListener("change", e => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const imp = JSON.parse(r.result);
          if (!Array.isArray(imp)) throw new Error();
          _data = [...imp, ..._data]; _persist(); _renderList();
          Core.emit("ui:notify", { msg: imp.length + "件インポートしました", type: "ok" });
        } catch { Core.emit("ui:notify", { msg: "インポート失敗", type: "error" }); }
      };
      r.readAsText(file); e.target.value = "";
    });
    document.getElementById("btn-clear-history").addEventListener("click", () => {
      if (!confirm("全履歴を削除しますか？")) return;
      _data = []; _persist(); _renderList();
    });
    _renderList();
  }

  function _renderList() {
    const el = document.getElementById("history-list");
    if (!_data.length) {
      el.innerHTML = `<p class="muted center">保存履歴なし</p>`;
      document.getElementById("history-detail").innerHTML = "";
      return;
    }
    el.innerHTML = _data.map(e => `
      <div class="history-item">
        <div class="history-item-header">
          <span class="history-race">${esc(e.race_name || "（未入力）")}</span>
          <span class="history-date">${e.race_date || e.saved_at?.slice(0,10) || ""}</span>
        </div>
        <div class="history-meta">
          ${(e.ranking||[]).slice(0,3).map(r =>
            `<span class="rank-chip">${r.rank}位 ${esc(r.horse_name)}</span>`).join("")}
        </div>
        <div class="history-actions">
          <button class="btn-sm" onclick="ModHistory.load('${e.id}')">読込</button>
          <button class="btn-sm danger" onclick="ModHistory.del('${e.id}')">削除</button>
        </div>
      </div>`).join("");
  }

  function load(id) {
    const entry = _data.find(e => e.id === id); if (!entry) return;
    // 詳細表示
    document.getElementById("history-detail").innerHTML = `
      <div class="detail-block">
        <h3>${esc(entry.race_name||"—")} <small>${entry.race_date||""}</small></h3>
        <div class="detail-section">
          <b>最終順位</b>
          <table><thead><tr><th>順位</th><th>馬名</th><th>指標</th></tr></thead>
          <tbody>${(entry.ranking||[]).map(r =>
            `<tr><td>${r.rank}</td><td>${esc(r.horse_name)}</td><td>${r.score!=null?r.score.toFixed(4):"-"}</td></tr>`
          ).join("")}</tbody></table>
        </div>
        ${entry.memo?`<div class="detail-section"><b>メモ・反省</b><p>${esc(entry.memo)}</p></div>`:""}
        <div class="detail-section">
          <b>使用係数スナップショット</b>
          <pre class="coeff-snap">${esc(JSON.stringify(entry.coeff_snap,null,2))}</pre>
        </div>
        <div class="detail-section">
          <b>入力テキスト</b>
          <pre class="raw-text">${esc(entry.raw_text||"")}</pre>
        </div>
      </div>`;
    Core.emit("history:loaded", { entry });
    Core.emit("ui:tab", { name: "input" });
    Core.emit("ui:notify", { msg: `「${entry.race_name||"—"}」を読み込みました`, type: "ok" });
  }

  function del(id) {
    if (!confirm("削除しますか？")) return;
    _data = _data.filter(e => e.id !== id); _persist(); _renderList();
  }

  function _persist() { localStorage.setItem(KEY, JSON.stringify(_data)); }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  }

  return { init, load, del };
})();
</script>
